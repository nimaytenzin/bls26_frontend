<!-- Sidebar Header with Logo -->
<div class="sidebar-header mb-6 pb-6 border-b border-slate-200">
	<div class="flex items-center justify-between mb-2">
		<div class="flex items-center">
			<img src="logo.png" class="h-10" alt="Logo" />
			<div class="font-semibold text-2xl ml-3 text-slate-900">
				{{ appName }}
			</div>
		</div>
		<!-- Mobile Close Button -->
		<button type="button" (click)="layoutService.onMenuToggle()"
			class="lg:hidden w-8 h-8 rounded-full hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
			<i class="pi pi-times"></i>
		</button>
	</div>
	<p class="text-xs text-slate-500">
		{{ appSlogan }}
	</p>
</div>

<!-- Navigation Menu -->
<app-admin-menu></app-admin-menu>
