<nav class="sidebar">
  <!-- Facility Selector using PrimeNG Dropdown -->
  <div class="custom-select-wrapper">
    <p-dropdown
      [options]="facilities"
      [(ngModel)]="selectedFacilityId"
      optionLabel="name"
      optionValue="id"
      placeholder="Select Facility"
      (onChange)="onFacilityChange($event.value)"
      appendTo="body"
      styleClass="w-full"
    ></p-dropdown>
  </div>

  <!-- PrimeNG Panel Menu -->
  <p-panelMenu
    [model]="panelMenuItems"
    [style]="{ width: '100%' }"
    (onNodeSelect)="onNavClick($event)"
  ></p-panelMenu>
</nav>
