<div class="layout-topbar bg-white">
	<!-- Animated Hamburger Menu Button -->
	<button
		#menubutton
		class="layout-menu-button"
		(click)="layoutService.onMenuToggle()"
		type="button"
		[class.active]="layoutService.state.staticMenuDesktopInactive === false"
		aria-label="Toggle menu"
	>
		<div class="hamburger">
			<span class="hamburger-line"></span>
			<span class="hamburger-line"></span>
			<span class="hamburger-line"></span>
		</div>
	</button>
	 

	<!-- Spacer to push menu to the right -->
	<div class="flex-1"></div>

	<!-- User Profile with Popover -->
	<div class="flex items-center gap-3" *ngIf="userProfile">
		<button
			type="button"
			(click)="profilePopover.toggle($event)"
			class="hidden sm:block relative focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 rounded-full transition-all hover:scale-105"
		>
			<p-avatar
				size="normal"
				shape="circle"
				class="ring-2 ring-slate-200 hover:ring-primary-300 cursor-pointer transition-all shadow-sm hover:shadow-md"
				[image]="userProfile.profileImage || undefined"
				[label]="getAvatarLabel()"
				styleClass="bg-primary-500 text-white"
			></p-avatar>
		</button>
		<div class="text-right hidden sm:block">
			<p class="text-sm font-semibold text-slate-900 m-0 leading-tight">
				{{ userProfile.name || 'User' }}
			</p>
			<p class="text-xs text-slate-500 m-0 leading-tight">
				{{ userProfile.role ? (userProfile.role | titlecase) : '' }}
			</p>
		</div>
		<p-popover
			#profilePopover
			[style]="{ width: '320px' }"
		>
			<ng-template pTemplate="content">
				<div class="flex flex-col">
					<!-- Profile Header -->
					<div class="flex items-center gap-3 p-4 border-b border-slate-200">
						<p-avatar
							size="large"
							shape="circle"
							class="ring-2 ring-primary-100"
							[image]="userProfile.profileImage || undefined"
							[label]="getAvatarLabel()"
							styleClass="bg-primary-500 text-white"
						></p-avatar>
						<div class="flex-1 min-w-0">
							<h3 class="text-base font-semibold text-slate-900 m-0 truncate">
								{{ userProfile.name }}
							</h3>
							<p class="text-xs text-primary-600 font-medium m-0 mt-0.5">
								{{ userProfile.role }}
							</p>
						</div>
					</div>

					<!-- Profile Details -->
					<div class="p-4 space-y-3">
						<div class="flex items-center gap-3">
							<div class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
								<i class="pi pi-envelope text-xs text-slate-600"></i>
							</div>
							<div class="flex-1 min-w-0">
								<p class="text-xs text-slate-500 m-0">Email</p>
								<p class="text-sm font-semibold text-slate-900 m-0 truncate">
									{{ userProfile.emailAddress }}
								</p>
							</div>
						</div>

						<div class="flex items-center gap-3" *ngIf="userProfile.phoneNumber">
							<div class="flex-shrink-0 w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center">
								<i class="pi pi-phone text-xs text-slate-600"></i>
							</div>
							<div class="flex-1 min-w-0">
								<p class="text-xs text-slate-500 m-0">Phone</p>
								<p class="text-sm font-semibold text-slate-900 m-0">
									{{ userProfile.phoneNumber }}
								</p>
							</div>
						</div>
					</div>

					<!-- Action Buttons -->
					<div class="border-t border-slate-200 p-3 space-y-2">
						<button
							type="button"
							class="w-full px-3 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors text-sm font-semibold flex items-center justify-center gap-2"
						>
							<i class="pi pi-user-edit text-xs"></i>
							Edit Profile
						</button>

						<button
							type="button"
							(click)="resetPassword(); profilePopover.hide()"
							class="w-full px-3 py-2 bg-white border border-slate-200 text-slate-700 rounded-lg hover:bg-slate-50 transition-colors text-sm font-semibold flex items-center justify-center gap-2"
						>
							<i class="pi pi-key text-xs"></i>
							Change Password
						</button>

						<button
							type="button"
							#logoutButton
							(click)="confirmLogout($event)"
							class="w-full px-3 py-2 bg-white border border-red-200 text-red-600 rounded-lg hover:bg-red-50 transition-colors text-sm font-semibold flex items-center justify-center gap-2"
						>
							<i class="pi pi-sign-out text-xs"></i>
							Sign Out
						</button>
					</div>
				</div>
			</ng-template>
			<button
				#profileButton
				type="button"
				(click)="profilePopover.toggle($event)"
				class="relative focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 rounded-full transition-all hover:scale-105"
			>
				<p-avatar
					size="normal"
					shape="circle"
					class="ring-2 ring-slate-200 hover:ring-primary-300 cursor-pointer transition-all shadow-sm hover:shadow-md"
					[image]="userProfile.profileImage || undefined"
					[label]="getAvatarLabel()"
					styleClass="bg-primary-500 text-white"
				></p-avatar>
			</button>
		</p-popover>
	</div>

</div>

<p-toast />
<p-confirmPopup />
