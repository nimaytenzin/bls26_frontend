<app-public-navbar></app-public-navbar>

<div class="register-wrapper">
  <div class="register-card">
    <p-card class="register-card">
      <ng-template pTemplate="title">
        <h2 class="register-title">Create Your Account</h2>
      </ng-template>

      <ng-template pTemplate="content">
        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form p-fluid">
          <div class="form-field">
            <label for="name">Full Name</label>
            <input id="name" type="text" pInputText formControlName="name" placeholder="Your full name" />
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input id="email" type="email" pInputText formControlName="email" placeholder="Email address" />
          </div>

          <div class="form-field">
            <label for="cid">CID</label>
            <input id="cid" type="text" pInputText formControlName="cid" placeholder="CID" />
          </div>

          <div class="form-field">
            <label for="phone">Phone</label>
            <input id="phone" type="text" pInputText formControlName="phone" placeholder="Phone number" />
          </div>

          <p-button
            type="submit"
            label="Register"
            icon="pi pi-user-plus"
            class="register-btn"
            [disabled]="registerForm.invalid"
          ></p-button>

          <div class="register-footer">
            Already have an account?
            <a routerLink="/login">Login</a>
          </div>
        </form>
      </ng-template>
    </p-card>
  </div>
</div>
