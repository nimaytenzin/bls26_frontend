<div class="modal-backdrop">
  <div class="modal-content record-payment-modal">
    <h2>Edit Payment</h2>
    <form (ngSubmit)="save()">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" [(ngModel)]="payment.amount" name="amount" step="0.01" required />
      </div>

      <div class="form-group">
        <label>Date</label>
        <input type="date" [(ngModel)]="payment.date" name="date" required />
      </div>

      <div class="form-group">
        <label>Method</label>
        <select [(ngModel)]="payment.method" name="method" required>
          <option *ngFor="let m of methods" [value]="m">{{ m | titlecase }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Reference <span class="optional">(optional)</span></label>
        <input type="text" [(ngModel)]="payment.reference" name="reference" />
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary">Save</button>
        <button type="button" class="btn cancel" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
