<div class="payment-history">
  <h3>Payment History</h3>
	<div class="toggle-deleted">
		<label>
			<input type="checkbox" [(ngModel)]="showDeleted" (change)="loadPayments()" />
			Show Deleted Payments
		</label>
	</div>

  <table *ngIf="payments.length; else noPayments">
    <thead>
      <tr>
        <th>Date</th>
        <th>Amount</th>
        <th>Method</th>
        <th>Reference</th>
				<th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of payments" [class.voided]="p.deleted">
        <td>{{ p.date | date: 'mediumDate' }}</td>
        <td>${{ p.amount.toFixed(2) }} <span *ngIf="p.deleted" class="badge voided-badge">Voided</span></td>
        <td>{{ p.method | titlecase }}</td>
        <td>{{ p.reference || '—' }}</td>
				<td>
					<!-- ✅ Add the edit button here -->
					<button class="btn small edit-btn" (click)="toggleEdit(p)">
						<fa-icon [icon]= icons.faPen></fa-icon>
					</button>

					<button class="btn small delete-btn" (click)="confirmDelete(p)"[disabled]="p.deleted">
						<fa-icon [icon]=icons.faTrash></fa-icon>
					</button>
				</td>
      </tr>
    </tbody>
  </table>

  <ng-template #noPayments>
    <p class="empty">No payments recorded yet.</p>
  </ng-template>

	<app-edit-payment-modal
		*ngIf="showEditModal"
		[payment]="editingPayment!"
		(paymentUpdated)="saveEditedPayment($event)"
		(cancelled)="showEditModal = false"
	/>

	<app-delete-payment-modal
		*ngIf="showDeleteModal"
		[payment]="deletingPayment!"
		(confirmed)="handleDeleteConfirmed()"
		(cancelled)="showDeleteModal = false"
	/>
</div>
