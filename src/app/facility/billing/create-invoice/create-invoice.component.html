<div class="modal-backdrop">
  <div class="modal-content invoice-modal">
    <h2>Create New Invoice</h2>
    <form [formGroup]="invoiceForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
				<label>Child</label>
				<select formControlName="childId">
					<option *ngFor="let child of children" [value]="child.id">
						{{ child.name }}
					</option>
  			</select>
      </div>

      <div class="form-group">
        <label>Due Date</label>
        <input formControlName="dueDate" type="date" />
      </div>

      <div formArrayName="items" class="item-list">
        <div *ngFor="let item of items.controls; let i = index" [formGroupName]="i" class="item-row">
          <input formControlName="description" placeholder="Description" />
          <input formControlName="quantity" type="number" min="1" />
          <input formControlName="unitPrice" type="number" min="0" />
          <button type="button" (click)="removeItem(i)">Remove</button>
        </div>
        <button type="button" class="add-item-btn" (click)="addItem()">Add Item</button>
      </div>

			<div class="total">
        Total: <strong>${{ getTotal().toFixed(2) }}</strong>
      </div>

			<div class="form-group">
				<label>
					<input type="checkbox" formControlName="isRecurring" /> Recurring Invoice
				</label>
			</div>

			<div class="form-group" *ngIf="invoiceForm.get('isRecurring')?.value">
				<label>Recurrence Pattern</label>
				<select formControlName="recurrencePattern">
					<option value="monthly">Monthly</option>
					<option value="weekly">Weekly</option>
				</select>
			</div>

      <div class="form-actions">
        <button type="submit" class="btn primary" [disabled]="invoiceForm.invalid">
          Create Invoice
        </button>
        <button type="button" class="btn cancel" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
