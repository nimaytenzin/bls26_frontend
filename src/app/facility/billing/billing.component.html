<div class="billing-page">
    <h1>Parent Billing System</h1>
  
    <!-- Parent Billing Table -->
    <div class="billing-table">
      <table>
        <thead>
          <tr>
            <th>Parent Name</th>
            <th>Subscription</th>
            <th>Amount</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let parent of parents">
            <td>{{ parent.name }}</td>
            <td>{{ parent.subscription }}</td>
            <td>${{ parent.amount }}</td>
            <td [class.paid]="parent.status === 'Paid'" [class.due]="parent.status === 'Due'">
              {{ parent.status }}
            </td>
            <td>
              <button
                *ngIf="parent.status === 'Due'"
                class="btn invoice-btn"
                (click)="generateInvoice(parent)"
              >
                Generate Invoice
              </button>
              <button
                *ngIf="parent.status === 'Paid'"
                class="btn report-btn"
                (click)="generateReport(parent)"
              >
                Generate Report
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  
    <!-- Payment Modal -->
    <div class="modal-backdrop" *ngIf="showPaymentModal">
      <div class="modal-content">
        <h2>Enter Payment Details</h2>
        <form (ngSubmit)="recordPayment()">
          <div class="form-group">
            <label for="paymentMode">Payment Mode</label>
            <select id="paymentMode" [(ngModel)]="paymentDetails.mode" name="paymentMode" required>
              <option value="cash">Cash</option>
              <option value="bankingApp">Banking App</option>
            </select>
          </div>
          <div class="form-group">
            <label for="amountPaid">Amount Paid</label>
            <input
              id="amountPaid"
              type="number"
              [(ngModel)]="paymentDetails.amount"
              name="amountPaid"
              required
            />
          </div>
          <button type="submit" class="btn primary">Submit Payment</button>
          <button type="button" class="btn cancel" (click)="closePaymentModal()">Cancel</button>
        </form>
      </div>
    </div>
  </div>
