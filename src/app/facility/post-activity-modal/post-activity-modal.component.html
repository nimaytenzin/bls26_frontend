<div class="modal-backdrop" *ngIf="show">
    <div class="modal-content">
      <h2>Post Activity/Event</h2>
      <form (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="title">Title</label>
          <input id="title" name="title" [(ngModel)]="activity.title" required />
        </div>
  
        <div class="form-group">
          <label for="description">Description</label>
          <textarea
            id="description"
            name="description"
            [(ngModel)]="activity.description"
            rows="4"
            required
          ></textarea>
        </div>
  
        <div class="form-group">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" [(ngModel)]="activity.date" required />
        </div>
  
        <div class="form-group">
          <label for="location">Location</label>
          <input id="location" name="location" [(ngModel)]="activity.location" required />
        </div>
  
        <div class="form-group">
          <label for="image">Upload Image</label>
          <input id="image" type="file" (change)="onFileChange($event)" accept="image/*" />
          <div class="file-name" *ngIf="selectedImageFile">{{ selectedImageFile.name }}</div>
          <img *ngIf="imagePreview" [src]="imagePreview" alt="Image Preview" class="image-preview" />
        </div>
  
        <div class="form-actions">
          <button type="button" class="btn cancel" (click)="onCancel()">Cancel</button>
          <button type="submit" class="btn primary">Post</button>
        </div>
      </form>
    </div>
  </div>
