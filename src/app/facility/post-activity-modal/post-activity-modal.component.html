<div class="modal-backdrop" *ngIf="show">
  <div class="modal-content">
    <h2>Post Activity</h2>
    <form (ngSubmit)="postActivity()">
      <div class="form-group">
        <label for="title">Title</label>
        <input id="title" [(ngModel)]="activity.title" name="title" required />
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" [(ngModel)]="activity.description" name="description"></textarea>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input id="location" [(ngModel)]="activity.location" name="location" />
      </div>

      <div class="form-group">
        <label for="images">Upload Images</label>
        <input
          id="images"
          type="file"
          (change)="handleFileSelection($event)"
          multiple
          accept="image/*"
        />
        <div class="image-preview-grid">
          <img *ngFor="let image of activity.imageUrls" [src]="image" alt="Uploaded Image" />
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary">Post</button>
        <button type="button" class="btn cancel" (click)="close.emit()">Cancel</button>
      </div>
    </form>
  </div>
</div>
