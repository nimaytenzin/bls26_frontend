<div class="modal-backdrop" *ngIf="show">
  <div class="modal-content">
    <h3>{{ announcement ? 'Edit' : 'Add' }} Announcement/Event</h3>
    <form (ngSubmit)="submit()">
      <input
        type="text"
        [(ngModel)]="newAnnouncement.title"
        name="title"
        placeholder="Title"
        required
      />
      <textarea
        [(ngModel)]="newAnnouncement.message"
        name="message"
        placeholder="Message"
        required
      ></textarea>
      <input
        type="date"
        [(ngModel)]="newAnnouncement.date"
        name="date"
        required
      />

      <select [(ngModel)]="newAnnouncement.type" name="type">
        <option value="announcement">Announcement</option>
        <option value="event">Event</option>
      </select>

      <select [(ngModel)]="newAnnouncement.visibility" name="visibility">
        <option value="all">Visible to Everyone</option>
        <option value="owners">Only Owners</option>
        <option value="parents">Only Parents</option>
      </select>

      <input type="file" multiple (change)="onFileChange($event)" />

      <div class="image-preview-container" *ngIf="imagePreviews.length > 0">
        <div class="image-item" *ngFor="let img of imagePreviews; let i = index">
          <img [src]="img" alt="Preview {{ i + 1 }}" />
          <button type="button" (click)="removeImage(i)">🗑</button>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn primary">{{ announcement ? 'Update' : 'Post' }}</button>
        <button type="button" class="btn cancel" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
