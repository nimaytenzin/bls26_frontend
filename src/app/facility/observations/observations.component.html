<div class="observations-container">
  <div class="observations-header">
    <h2>Observations</h2>
    <button class="btn primary" (click)="openAddObservation()">Add Observation</button>
  </div>

  <div *ngIf="observations.length === 0" class="empty-message">
    <p>No observations available.</p>
  </div>

  <ul class="observation-list" *ngIf="observations.length > 0">
    <li *ngFor="let obs of observations" class="observation-card">
      <div class="observation-info">
        <h3>Child ID: {{ obs.childId }}</h3>
        <p><strong>Outcomes:</strong> {{ obs.outcomes.join(', ') }}</p>
        <p>{{ obs.description }}</p>
        <span class="tag">{{ obs.visibility }}</span>
      </div>
      <div class="actions">
        <button class="btn outline" (click)="openEditObservation(obs)">Edit</button>
      </div>
    </li>
  </ul>

  <app-observation-modal
    [show]="showModal"
    [data]="selectedObservation"
    (save)="handleSave($event)"
    (cancel)="showModal = false">
  </app-observation-modal>
</div>
