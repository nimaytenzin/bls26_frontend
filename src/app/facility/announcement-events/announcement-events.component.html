<div class="announcement-page">
  <!-- Header -->
  <div class="header">
    <h2>Announcements & Events</h2>
    <button class="btn primary" (click)="openModal()">+ Add</button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-button" [class.active]="selectedTab === 'announcement'" (click)="selectTab('announcement')">
      <fa-icon [icon]="icons.faAnnouncement"></fa-icon> Announcements
    </button>
    <button class="tab-button" [class.active]="selectedTab === 'event'" (click)="selectTab('event')">
      <fa-icon [icon]="icons.faCalendar"></fa-icon> Events
    </button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <label for="dateFilter">Filter:</label>
    <select id="dateFilter" [(ngModel)]="filterDateRange" (change)="groupAnnouncementsByDate()">
      <option value="all">All Dates</option>
      <option value="today">Today</option>
      <option value="thisWeek">This Week</option>
    </select>

    <input
      type="text"
      [formControl]="searchControl"
      placeholder="Search announcements..."
      aria-label="Search announcements"
    />
  </div>

  <!-- Announcement Groups -->
  <div *ngFor="let group of ['Today', 'This Week', 'Earlier']">
    <h3 *ngIf="grouped[group]?.length" class="group-title">{{ group }}</h3>
    <div class="card" *ngFor="let ann of grouped[group]">
      <div class="card-header">
        <h4>{{ ann.title }}</h4>
        <div class="meta">
          <span class="date">{{ ann.date | date: 'shortDate' }}</span>
          <span class="actions" *ngIf="isOwner && ann.createdBy === currentUser">
            <button (click)="startEdit(ann)" title="Edit"><fa-icon [icon]="icons.faPen"></fa-icon></button>
            <button (click)="deletePost(ann.id!)" title="Delete"><fa-icon [icon]="icons.faTrash"></fa-icon></button>
          </span>
        </div>
      </div>

      <p class="message">{{ ann.message }}</p>

      <!-- Image Previews -->
      <div class="announcement-images" *ngIf="ann.imageUrls?.length">
        <img
          *ngFor="let img of ann.imageUrls; let i = index"
          [src]="img"
          (click)="openLightbox(ann.imageUrls!, i)"
          alt="Announcement Media"
        />
      </div>

      <!-- Reactions -->
      <div class="interactions">
        <button (click)="likePost(ann)">
          <fa-icon [icon]="icons.faHeart"></fa-icon>
          <span>{{ ann.likes?.length || 0 }}</span>
        </button>
      </div>

      <!-- Comments -->
      <div class="comments-section">
        <div class="comment" *ngFor="let c of ann.comments || []">
          <strong>{{ c.user }}</strong>: {{ c.text }}
        </div>
        <form (ngSubmit)="addComment(ann, commentInput.value)">
          <input #commentInput type="text" placeholder="Write a comment..." required />
          <button type="submit"><fa-icon [icon]="icons.faComment"></fa-icon></button>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <app-announcement-modal
    [show]="showModal"
    (close)="closeModal()"
    (post)="handlePost($event)"
    [announcement]="editingAnnouncement"
  ></app-announcement-modal>

  <!-- Lightbox -->
  <div class="lightbox-backdrop" *ngIf="selectedImage" (click)="closeLightbox()">
    <div class="lightbox-content" (click)="$event.stopPropagation()">
      <img [src]="selectedImage" alt="Preview" />

      <button class="prev-btn" *ngIf="lightboxIndex > 0" (click)="prevImage()">
        <fa-icon [icon]="icons.faChevronLeft"></fa-icon>
      </button>
      <button class="next-btn" *ngIf="lightboxIndex < lightboxImages.length - 1" (click)="nextImage()">
        <fa-icon [icon]="icons.faChevronRight"></fa-icon>
      </button>
      <button class="close-btn" (click)="closeLightbox()">
        <fa-icon [icon]="icons.faTimes"></fa-icon>
      </button>
    </div>
  </div>
</div>
