<div class="facility-container">
  <div class="facility-header">
    <h2>My Facilities</h2>
    <button class="btn primary" (click)="openAddFacilityDialog()">Add New Facility</button>
  </div>

  <div *ngIf="facilities.length === 0" class="empty-message">
    <p>No facilities found under your account.</p>
  </div>

  <ul class="facility-list" *ngIf="facilities.length > 0">
    <li *ngFor="let facility of facilities" class="facility-card">
      <div class="facility-info">
        <h3>{{ facility.name }}</h3>
        <p class="description">{{ facility.description || 'No description provided.' }}</p>
        <span class="location">📍 {{ facility.location }}</span>
      </div>
      <div class="actions">
        <button class="btn small outline" (click)="openEditFacilityDialog(facility)">Edit</button>
      </div>
    </li>
  </ul>

  <!-- Modal -->
	<app-facility-modal
  [show]="showModal"
  [data]="selectedFacility"
  (save)="handleSave($event)"
  (cancel)="showModal = false">
</app-facility-modal>
</div>
