<div class="modal-backdrop" *ngIf="show">
  <div class="modal-content">
    <h2>{{ data ? 'Edit Observation' : 'Add Observation' }}</h2>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="observation-form">
      <div class="form-group">
        <label>Child ID:</label>
        <input type="number" formControlName="childId" />
      </div>

      <div class="form-group">
        <label>Outcomes:</label>
        <select formControlName="outcomes" multiple>
          <option *ngFor="let outcome of availableOutcomes" [value]="outcome">{{ outcome }}</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description:</label>
        <textarea formControlName="description"></textarea>
      </div>

      <div class="form-group">
        <label>Visibility:</label>
        <select formControlName="visibility">
          <option value="internal">Internal</option>
          <option value="family">Family</option>
        </select>
      </div>

      <div class="form-group">
        <label>Upload Media:</label>
        <input type="file" (change)="onFileChange($event)" />
      </div>

      <div class="form-actions">
        <button type="button" class="btn cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn primary" [disabled]="form.invalid">Submit</button>
      </div>
    </form>
  </div>
</div>
