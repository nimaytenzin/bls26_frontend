<div class="package-container">
  <button class="btn primary" (click)="openAddModal()">Add New Package</button>

  <div class="package-table" *ngIf="packages.length > 0">
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Package Name</th>
          <th>Description</th>
          <th>Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let pkg of packages">
          <td>{{ pkg.name }}</td>
          <td>{{ pkg.description }}</td>
          <td>${{ pkg.price }}</td>
					<td>
						<button class="btn btn-outline btn-sm" (click)="openEditModal(pkg)">Edit</button>
						<button
						class="btn btn-danger btn-sm"
						*ngIf="pkg.id !== undefined"
						(click)="deletePackage(pkg.id.toString())">
						Delete
					</button>
					</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal Component -->
  <app-package-modal
    [show]="showModal"
    [data]="editingPackage"
    (save)="handleSave($event)"
    (cancel)="showModal = false">
  </app-package-modal>
</div>
