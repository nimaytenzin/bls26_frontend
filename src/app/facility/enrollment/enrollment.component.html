<form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()" novalidate>
  <!-- Step 1: Child Info -->
  <div *ngIf="currentStep === 0" formGroupName="child">
    <h3>Child Information</h3>

    <div class="form-group">
      <input id="childName" name="childName" formControlName="name" placeholder=" " required />
      <label for="childName">Full Name</label>
      <div class="error" *ngIf="isInvalid('child.name')">Name is required.</div>
    </div>

    <div class="form-group">
      <input id="preferredName" name="preferredName" formControlName="preferredName" placeholder=" " />
      <label for="preferredName">Preferred Name</label>
    </div>

    <div class="form-group">
      <input id="childCID" name="childCID" formControlName="cid" placeholder=" " required />
      <label for="childCID">CID</label>
      <div class="error" *ngIf="isInvalid('child.cid')">CID is required.</div>
    </div>

    <!-- Child Image Upload -->
    <div class="form-group">
      <input
        type="file"
        id="childImage"
        name="childImage"
        (change)="onFileChange($event, 'child')"
        accept="image/*"
      />
      <label for="childImage">Upload Child's Image</label>
    </div>

    <div class="form-group">
      <input id="studentCode" name="studentCode" formControlName="studentCode" placeholder=" " required />
      <label for="studentCode">Student Code</label>
      <div class="error" *ngIf="isInvalid('child.studentCode')">Student Code is required.</div>
    </div>

    <div class="form-group">
      <input id="dob" name="dob" formControlName="dob" type="date" placeholder=" " required />
      <label for="dob">Date of Birth</label>
      <div class="error" *ngIf="isInvalid('child.dob')">Date of Birth is required.</div>
    </div>

    <div class="form-group">
      <select id="gender" name="gender" formControlName="gender" placeholder=" ">
        <option value="" disabled>Select Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>
      <label for="gender">Gender</label>
    </div>
  </div>

  <!-- Step 2: Child Notes + Package -->
  <div *ngIf="currentStep === 1">
    <div formGroupName="childNote">
      <h3>Child Notes</h3>
      <div class="form-group">
        <textarea id="medicalCondition" name="medicalCondition" formControlName="medicalCondition" placeholder=" "></textarea>
        <label for="medicalCondition">Medical Condition</label>
      </div>
      <div class="form-group">
        <textarea id="specialInstruction" name="specialInstruction" formControlName="specialInstruction" placeholder=" "></textarea>
        <label for="specialInstruction">Special Instructions</label>
      </div>
      <div class="form-group">
        <textarea id="notes" name="notes" formControlName="notes" placeholder=" "></textarea>
        <label for="notes">Other Notes</label>
      </div>
    </div>

    <div formGroupName="packageForm">
      <h3>Package Information</h3>
      <div class="form-group">
        <select id="packageId" name="packageId" formControlName="packageId">
          <option value="" disabled>Select a Package</option>
          <option *ngFor="let pkg of packages" [value]="pkg.id">{{ pkg.name }} ({{ pkg.price | currency }})</option>
        </select>
        <label for="packageId">Package</label>
        <div class="error" *ngIf="isInvalid('packageForm.packageId')">Package is required.</div>
      </div>

      <div class="form-group">
        <input id="startDate" name="startDate" formControlName="startDate" type="date" />
        <label for="startDate">Start Date</label>
      </div>
      <div class="form-group">
        <input id="endDate" name="endDate" formControlName="endDate" type="date" />
        <label for="endDate">End Date</label>
      </div>
    </div>
  </div>

  <!-- Step 3: Parents -->
  <div *ngIf="currentStep === 2" formArrayName="parents">
    <h3>Parent(s) Information</h3>
    <div *ngFor="let parent of parents.controls; let i = index" [formGroupName]="i" class="parent-card">
      <div class="form-group">
        <input id="parentName{{ i }}" name="parentName{{ i }}" formControlName="name" placeholder=" " />
        <label for="parentName{{ i }}">Parent Name</label>
      </div>
      <div class="form-group">
        <input id="parentEmail{{ i }}" name="parentEmail{{ i }}" formControlName="email" placeholder=" " />
        <label for="parentEmail{{ i }}">Email</label>
      </div>
      <div class="form-group">
        <input id="parentCID{{ i }}" name="parentCID{{ i }}" formControlName="cid" placeholder=" " />
        <label for="parentCID{{ i }}">CID</label>
      </div>

      <!-- Parent Image Upload -->
      <div class="form-group">
        <input
          type="file"
          id="parentImage{{ i }}"
          name="parentImage{{ i }}"
          (change)="onFileChange($event, 'parent', i)"
          accept="image/*"
          />
        <label for="parentImage{{ i }}">Upload Parent's Image</label>
      </div>

      <div class="form-group">
        <input id="parentPhone{{ i }}" name="parentPhone{{ i }}" formControlName="phone" placeholder=" " />
        <label for="parentPhone{{ i }}">Phone</label>
      </div>
      <button type="button" class="remove-btn" (click)="removeParent(i)" *ngIf="parents.length > 1">Remove</button>
    </div>
    <button type="button" class="add-btn" (click)="addParent()">+ Add Parent</button>
  </div>

  <!-- Navigation -->
  <div class="step-nav">
    <button type="button" (click)="prevStep()" [disabled]="currentStep === 0">Back</button>
    <button type="button" (click)="nextStep()" *ngIf="currentStep < 2">Next</button>
    <button type="submit" *ngIf="currentStep === 2">Submit</button>
  </div>
</form>
