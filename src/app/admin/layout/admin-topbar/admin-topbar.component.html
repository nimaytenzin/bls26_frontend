<div class="layout-topbar">
	<button
		#menubutton
		class="p-link layout-menu-button layout-topbar-button"
		(click)="layoutService.onMenuToggle()"
	>
		<svg
			xmlns="http://www.w3.org/2000/svg"
			width="24"
			height="24"
			viewBox="0 0 24 24"
			fill="none"
		>
			<path
				d="M4 18H10"
				stroke="#000000"
				stroke-width="2"
				stroke-linecap="round"
			/>
			<path
				d="M4 12L16 12"
				stroke="#000000"
				stroke-width="2"
				stroke-linecap="round"
			/>
			<path
				d="M4 6L20 6"
				stroke="#000000"
				stroke-width="2"
				stroke-linecap="round"
			/>
		</svg>
	</button>

	<!-- Spacer to push menu to the right -->
	<div class="flex-1"></div>

	<button
		#topbarmenubutton
		class="p-link layout-topbar-menu-button layout-topbar-button"
		(click)="layoutService.showProfileSidebar()"
	>
		<svg
			xmlns="http://www.w3.org/2000/svg"
			width="24"
			height="24"
			viewBox="0 0 24 24"
			fill="none"
		>
			<path
				d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
				fill="#000000"
			/>
		</svg>
	</button>

	<div
		#topbarmenu
		class="layout-topbar-menu"
		[ngClass]="{
			'layout-topbar-menu-mobile-active':
				layoutService.state.profileSidebarVisible
		}"
	>
		<button
			class="p-link layout-topbar-button"
			(click)="profileSideBarVisible = true"
		>
			<i class="pi pi-user"></i>
		</button>
		<button class="p-link layout-topbar-button" (click)="logout()">
			<i class="pi pi-objects-column"></i>
		</button>
	</div>
</div>
<p-toast />
<p-confirmPopup />

<p-sidebar
	[(visible)]="profileSideBarVisible"
	position="right"
	[style]="{ width: '350px' }"
	header="Profile"
>
	<div class="flex flex-col gap-6 p-4">
		<!-- Profile Header -->
		<div class="flex flex-col items-center text-center gap-4">
			<p-avatar
				[image]="userProfile.avatar"
				size="xlarge"
				shape="circle"
				class="ring-4 ring-blue-100"
			></p-avatar>
			<div>
				<h3 class="text-xl font-semibold text-gray-800 m-0">
					{{ userProfile.name }}
				</h3>
				<p class="text-sm text-blue-600 font-medium m-0">
					{{ userProfile.role }}
				</p>
				<p class="text-xs text-gray-500 m-0">{{ userProfile.department }}</p>
			</div>
		</div>

		<!-- Profile Details -->
		<div class="border-t pt-4">
			<div class="space-y-4">
				<div class="flex items-center gap-3">
					<i class="pi pi-envelope text-gray-400"></i>
					<div class="flex-1">
						<p class="text-xs text-gray-500 m-0">Email</p>
						<p class="text-sm font-medium text-gray-800 m-0">
							{{ userProfile.email }}
						</p>
					</div>
				</div>

				<div class="flex items-center gap-3">
					<i class="pi pi-phone text-gray-400"></i>
					<div class="flex-1">
						<p class="text-xs text-gray-500 m-0">Phone</p>
						<p class="text-sm font-medium text-gray-800 m-0">
							{{ userProfile.phone }}
						</p>
					</div>
				</div>

				<div class="flex items-center gap-3">
					<i class="pi pi-map-marker text-gray-400"></i>
					<div class="flex-1">
						<p class="text-xs text-gray-500 m-0">Location</p>
						<p class="text-sm font-medium text-gray-800 m-0">
							{{ userProfile.location }}
						</p>
					</div>
				</div>

				<div class="flex items-center gap-3">
					<i class="pi pi-calendar text-gray-400"></i>
					<div class="flex-1">
						<p class="text-xs text-gray-500 m-0">Joined</p>
						<p class="text-sm font-medium text-gray-800 m-0">
							{{ userProfile.joinDate | date : "MMM dd, yyyy" }}
						</p>
					</div>
				</div>
			</div>
		</div>

		<!-- Action Buttons -->
		<div class="border-t pt-4 space-y-3">
			<p-button
				label="Edit Profile"
				icon="pi pi-user-edit"
				class="w-full"
				severity="secondary"
				outlined="true"
			></p-button>

			<p-button
				label="Change Password"
				icon="pi pi-key"
				class="w-full"
				severity="secondary"
				outlined="true"
				(onClick)="resetPassword()"
			></p-button>

			<p-button
				label="Settings"
				icon="pi pi-cog"
				class="w-full"
				severity="secondary"
				outlined="true"
			></p-button>

			<div class="border-t pt-3">
				<p-button
					label="Sign Out"
					icon="pi pi-sign-out"
					class="w-full"
					severity="danger"
					outlined="true"
					(onClick)="logout()"
				></p-button>
			</div>
		</div>
	</div>
</p-sidebar>
