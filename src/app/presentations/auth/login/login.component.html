<!-- NSB Professional Login -->
<div
	class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8 relative overflow-hidden"
>
	<!-- Particles Background -->
	<div id="particles-js" class="absolute inset-0 z-0"></div>
	<div class="sm:mx-auto sm:w-full sm:max-w-md relative z-10">
		<!-- Header Section -->
		<div class="flex flex-col items-center">
			<div class="text-center">
				<h2 class="text-3xl font-bold text-gray-900 tracking-tight">
					National Sampling Frame Dashboard
				</h2>
				<p class="mt-2 text-sm text-gray-600">
					National Statistics Bureau of Bhutan
				</p>
			</div>
		</div>
	</div>

	<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md relative z-10">
		<div
			class="bg-white/95 backdrop-blur-sm py-8 px-4 shadow-lg sm:rounded-lg sm:px-10 border border-gray-200"
		>
			<!-- Error Message -->
			<div
				*ngIf="errorMessage"
				class="mb-6 p-4 bg-red-50 border border-red-200 text-red-700 rounded-md"
			>
				<div class="flex">
					<i class="pi pi-exclamation-triangle text-red-400 mr-3 mt-0.5"></i>
					<div class="text-sm">{{ errorMessage }}</div>
				</div>
			</div>

			<form [formGroup]="loginForm" (ngSubmit)="login()" class="space-y-6">
				<!-- Email Field -->
				<div>
					<label
						for="email"
						class="block text-sm font-medium text-gray-700 mb-2"
					>
						Email Address
					</label>
					<div class="relative">
						<input
							id="email"
							name="email"
							type="email"
							formControlName="email"
							placeholder="your.email@nsb.gov.bt"
							class="appearance-none block w-full px-3 py-3 border rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-gray-500 transition-colors text-sm"
							[class.border-red-300]="hasFieldError('email')"
							[class.border-gray-300]="!hasFieldError('email')"
							[class.focus:ring-red-500]="hasFieldError('email')"
							[class.focus:border-red-500]="hasFieldError('email')"
						/>
					</div>
					<p *ngIf="hasFieldError('email')" class="mt-2 text-sm text-red-600">
						{{ getFieldError("email") }}
					</p>
				</div>

				<!-- Password Field -->
				<div>
					<label
						for="password"
						class="block text-sm font-medium text-gray-700 mb-2"
					>
						Password
					</label>
					<div class="relative">
						<p-password
							id="password"
							formControlName="password"
							[toggleMask]="true"
							[feedback]="false"
							placeholder="Enter your password"
							styleClass="w-full"
							inputStyleClass="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-500 focus:border-gray-500 transition-colors text-sm"
							[class.ng-invalid]="hasFieldError('password')"
						></p-password>
					</div>
					<p
						*ngIf="hasFieldError('password')"
						class="mt-2 text-sm text-red-600"
					>
						{{ getFieldError("password") }}
					</p>
				</div>

				<!-- Login Button -->
				<div>
					<button
						type="submit"
						[disabled]="loginForm.invalid || isLoading"
						class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
						[class.bg-gray-600]="!isLoading"
						[class.hover:bg-gray-700]="!isLoading"
						[class.bg-gray-400]="isLoading"
					>
						<span class="absolute left-0 inset-y-0 flex items-center pl-3">
							<i
								*ngIf="!isLoading"
								class="pi pi-sign-in text-gray-300 group-hover:text-gray-200"
							></i>
							<i
								*ngIf="isLoading"
								class="pi pi-spin pi-spinner text-gray-300"
							></i>
						</span>
						{{ isLoading ? "Signing in..." : "Sign in" }}
					</button>
				</div>

				<!-- Divider -->
				<div class="relative">
					<div class="absolute inset-0 flex items-center">
						<div class="w-full border-t border-gray-300"></div>
					</div>
					<div class="relative flex justify-center text-sm">
						<span class="px-2 bg-white text-gray-500">Need access?</span>
					</div>
				</div>

				<!-- Footer Links -->
				<div class="text-center space-y-2">
					<button
						type="button"
						(click)="navigateToHome()"
						class="text-sm text-gray-600 hover:text-gray-900 transition-colors underline"
					>
						← Back to Home
					</button>
					<p class="text-xs text-gray-500 mt-3">
						For technical support, contact IT Department
					</p>
				</div>
			</form>
		</div>

		<!-- Additional Information -->
		<div class="mt-6 text-center relative z-10">
			<div class="text-xs text-gray-500 space-y-1">
				<p>© 2024 National Statistics Bureau of Bhutan</p>
				<p>Royal Government of Bhutan</p>
			</div>
		</div>
	</div>
</div>
