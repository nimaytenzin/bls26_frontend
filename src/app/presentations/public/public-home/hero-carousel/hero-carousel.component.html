<!-- Full Width Hero Carousel - Enhanced Visual Design -->
<div class="w-screen overflow-hidden mt-4 sm:mt-0 relative">
	<p-carousel
		[value]="movies"
		[numVisible]="1"
		[numScroll]="1"
		[circular]="true"
		[autoplayInterval]="6000"
		[showIndicators]="false"
		[showNavigators]="false"
		styleClass="hero-carousel"
	>
		<ng-template let-movie pTemplate="item">
			<div
				class="relative w-full h-[80vh] p-0 m-0 md:h-[80vh] carousel-slide overflow-hidden cursor-pointer"
				[style.background-image]="'url(' + getCarouselImage(movie) + ')'"
				style="
					background-size: cover;
					background-position: center;
					background-repeat: no-repeat;
				"
			>
				<!-- Animated Particles Background -->
				<div
					class="absolute inset-0 opacity-30 transition-opacity duration-700 hover:opacity-20"
				>
					<div class="floating-particles">
						<div
							class="particle"
							*ngFor="let i of [1, 2, 3, 4, 5, 6, 7, 8]"
						></div>
					</div>
				</div>

				<!-- Enhanced gradient overlay with smooth animation -->
				<div
					class="absolute inset-0 bg-gradient-to-r from-black/50 via-black/30 to-black/20 transition-all duration-500 ease-in-out carousel-slide:hover:from-black/40 carousel-slide:hover:via-black/25 carousel-slide:hover:to-black/15"
				></div>
				<div
					class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent transition-all duration-500 ease-in-out carousel-slide:hover:from-black/60"
				></div>

				<!-- Decorative Elements with hover animation -->
				<div
					class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-600 via-red-500 to-red-400 opacity-80 transition-all duration-300 carousel-slide:hover:opacity-100 carousel-slide:hover:h-3"
				></div>
				<div
					class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-red-400 via-red-500 to-red-600 opacity-60 transition-all duration-300 carousel-slide:hover:opacity-90 carousel-slide:hover:h-2"
				></div>

				<!-- Content positioned at bottom with enhanced styling -->
				<div
					class="absolute bottom-0 left-0 right-0 p-4 md:p-8 lg:p-16 transform transition-all duration-500 ease-out carousel-slide:hover:translate-y-[-4px]"
				>
					<div class="max-w-5xl">
						<!-- Movie title with enhanced effects -->
						<div class="mb-6">
							<div class="inline-block relative">
								<h1
									class="text-4xl md:text-6xl lg:text-7xl font-black text-white mb-2 leading-tight tracking-tight movie-title-gradient transition-all duration-300 carousel-slide:hover:scale-105"
								>
									{{ movie.name }}
								</h1>
								<div
									class="absolute -bottom-2 left-0 w-24 h-1 bg-gradient-to-r from-red-600 to-red-400 rounded-full transform scale-x-0 carousel-slide:hover:scale-x-100 transition-transform duration-700 ease-out"
								></div>
							</div>
							<!-- Mobile truncated description, full description on desktop -->
							<p
								class="text-white text-sm md:text-base line-clamp-2 md:line-clamp-none transition-all duration-300 carousel-slide:hover:text-gray-100"
							>
								{{ movie.description }}
							</p>
						</div>

						<!-- Enhanced movie details with glassmorphism -->
						<div
							class="flex flex-wrap items-center gap-2 md:gap-4 mb-6 md:mb-8 text-white/90 text-sm md:text-lg backdrop-blur-sm md:backdrop-blur-md bg-white/10 md:bg-white/5 rounded-xl md:rounded-2xl p-3 md:p-4 border border-white/20 md:border-white/10 transition-all duration-400 carousel-slide:hover:bg-white/15 md:carousel-slide:hover:bg-white/10 carousel-slide:hover:border-white/30 md:carousel-slide:hover:border-white/20 carousel-slide:hover:scale-105"
						>
							<div
								class="flex items-center space-x-1 md:space-x-2 transition-transform duration-300 carousel-slide:hover:scale-110"
							>
								<i
									class="pi pi-star-fill text-yellow-400 text-xs md:text-sm"
								></i>
								<span
									class="px-2 py-1 md:px-3 md:py-1 rounded-full text-white font-bold text-xs md:text-sm"
									>{{ movie.pgRating }}</span
								>
							</div>
							<span class="text-red-400 text-xs md:text-base">•</span>
							<div
								class="flex items-center space-x-1 md:space-x-2 transition-transform duration-300 carousel-slide:hover:scale-110"
							>
								<i class="pi pi-clock text-blue-400 text-xs md:text-sm"></i>
								<span
									class="px-2 py-1 md:px-3 md:py-1 rounded-full text-white font-semibold text-xs md:text-sm"
									>{{ formatDuration(movie.durationMin) }}</span
								>
							</div>
							<span class="text-red-400 text-xs md:text-base">•</span>
							<div
								class="flex items-center space-x-1 md:space-x-2 transition-transform duration-300 carousel-slide:hover:scale-110"
							>
								<i class="pi pi-tags text-green-400 text-xs md:text-sm"></i>
								<span
									class="px-2 py-1 md:px-3 md:py-1 rounded-full text-white font-semibold text-xs md:text-sm"
									>{{ getGenresText(movie) }}</span
								>
							</div>
						</div>

						<!-- Enhanced action buttons -->
						<div class="flex flex-row gap-3 md:gap-4">
							<button
								*ngIf="isMovieBookable(movie.screeningStatus)"
								(click)="onBuyTickets(movie.id)"
								class="group px-4 py-2 md:px-8 md:py-4 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold text-xs md:text-lg rounded-lg md:rounded-xl flex items-center justify-center gap-2 md:gap-3 transition-all duration-300 hover:scale-105 hover:shadow-2xl hover:shadow-red-500/25 border-2 border-red-500/20 hover:border-red-400/40 relative overflow-hidden"
							>
								<div
									class="absolute inset-0 bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"
								></div>
								<i
									class="pi pi-ticket text-sm md:text-xl relative z-10 transition-transform duration-300 group-hover:scale-110"
								></i>
								<span class="relative z-10 text-xs md:text-base"
									>BUY TICKETS</span
								>
							</button>

							<button
								*ngIf="!isMovieBookable(movie.screeningStatus)"
								disabled
								class="px-4 py-2 md:px-8 md:py-4 bg-gradient-to-r from-gray-700 to-gray-800 text-gray-400 font-bold text-xs md:text-lg rounded-lg md:rounded-xl cursor-not-allowed flex items-center justify-center gap-2 md:gap-3 border-2 border-gray-600/40"
							>
								<i class="pi pi-clock text-sm md:text-xl"></i>
								<span class="text-xs md:text-base">{{
									getMovieButtonText(movie.screeningStatus)
								}}</span>
							</button>

							<!-- Mobile: Circular play button -->
							<button
								*ngIf="movie.trailerURL"
								(click)="onWatchTrailer(movie.trailerURL)"
								class="sm:hidden group w-10 h-10 bg-black/70 backdrop-blur-sm border-2 border-white/40 text-white hover:bg-white/10 hover:border-white/80 rounded-full flex items-center justify-center transition-all duration-300 relative overflow-hidden self-start"
							>
								<div
									class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 rounded-full"
								></div>
								<i class="pi pi-play text-sm relative z-10 ml-0.5"></i>
							</button>

							<!-- Desktop: Full trailer button -->
							<button
								*ngIf="movie.trailerURL"
								(click)="onWatchTrailer(movie.trailerURL)"
								class="hidden sm:flex group px-4 py-2 md:px-6 md:py-4 bg-transparent border-2 border-white/40 text-white hover:bg-white/10 hover:border-white/80 font-semibold rounded-lg md:rounded-xl items-center gap-2 md:gap-3 transition-all duration-300 backdrop-blur-md relative overflow-hidden hover:scale-105"
							>
								<div
									class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700"
								></div>
								<i
									class="pi pi-play text-sm md:text-lg relative z-10 transition-transform duration-300 group-hover:scale-110"
								></i>
								<span class="relative z-10 text-xs md:text-base"
									>Watch Trailer</span
								>
							</button>
						</div>
					</div>
				</div>

				<!-- Enhanced slide indicator -->
				<div class="absolute bottom-4 right-4 md:bottom-8 md:right-8 z-20">
					<div
						class="backdrop-blur-md bg-black/30 border border-white/20 px-4 py-2 rounded-full text-white text-sm font-medium shadow-lg transition-all duration-300 carousel-slide:hover:bg-black/50 carousel-slide:hover:border-white/40 carousel-slide:hover:scale-110"
					>
						<span class="text-red-400">{{ movies.indexOf(movie) + 1 }}</span>
						<span class="text-white/60">of</span>
						<span class="text-white">{{ movies.length }}</span>
					</div>
				</div>

				<!-- Movie Rating Badge -->
				<div class="absolute top-4 left-4 md:top-8 md:left-8 z-20">
					<div
						class="backdrop-blur-md bg-gradient-to-r from-yellow-500/20 to-orange-500/20 border border-yellow-400/30 px-3 py-2 rounded-xl transition-all duration-300 carousel-slide:hover:from-yellow-500/30 carousel-slide:hover:to-orange-500/30 carousel-slide:hover:border-yellow-400/50 carousel-slide:hover:scale-110"
					>
						<div class="flex items-center space-x-2">
							<i
								class="pi pi-star-fill text-yellow-400 text-sm transition-transform duration-300 carousel-slide:hover:scale-125"
							></i>
							<span class="text-yellow-400 font-bold text-sm">{{
								movie.pgRating
							}}</span>
						</div>
					</div>
				</div>
			</div>
		</ng-template>
	</p-carousel>
</div>
