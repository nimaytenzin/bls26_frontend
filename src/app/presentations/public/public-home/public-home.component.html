<!-- Loading State -->
<div *ngIf="isLoading" class="flex justify-center items-center h-64">
	<div
		class="animate-spin rounded-full h-12 w-12 border-b-2 border-red-600"
	></div>
	<span class="ml-3 text-white text-lg">Loading movies...</span>
</div>

<!-- Error State -->
<div *ngIf="error && !isLoading" class="text-center p-8">
	<div class="text-red-400 text-lg mb-4">
		<i class="pi pi-exclamation-triangle mr-2"></i>
		{{ error }}
	</div>
	<button
		class="px-6 py-3 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white rounded-lg transition-all duration-300 hover:scale-105 shadow-lg"
		(click)="loadMovies()"
	>
		Retry
	</button>
</div>

<!-- Hero Carousel Component -->
<app-hero-carousel
	[movies]="movies"
	[isLoading]="isLoading"
	(buyTicketsClicked)="buyTickets($event)"
	(watchTrailerClicked)="watchTrailer($event)"
>
</app-hero-carousel>

<!-- Movie List Section -->
<div class="mobile-container w-full sm:max-w-[80vw] mx-auto mt-20 px-0 sm:px-6">
	<!-- Enhanced Section Header -->
	<div class="mobile-section-header mb-12 px-4 sm:px-0 relative">
		<div class="flex items-center gap-4 mb-6">
			<div
				class="h-1 w-16 bg-gradient-to-r from-red-600 to-red-400 rounded-full"
			></div>
			<h2
				class="text-3xl sm:text-4xl lg:text-5xl font-black text-white tracking-tight"
			>
				All Movies
			</h2>
			<div
				class="h-1 flex-1 bg-gradient-to-r from-red-400 to-transparent rounded-full"
			></div>
		</div>
		<p class="text-gray-400 text-lg ml-20">
			Discover and book tickets for the latest movies
		</p>
		<!-- Decorative accent -->
		<div
			class="absolute -top-2 left-4 w-2 h-2 bg-red-600 rounded-full animate-pulse"
		></div>
		<div
			class="absolute -top-1 left-8 w-1 h-1 bg-red-400 rounded-full animate-pulse"
			style="animation-delay: 0.5s"
		></div>
	</div>

	<!-- Enhanced Status Filter Tabs -->
	<div
		class="mobile-filter-tabs flex gap-2 sm:gap-4 mb-12 px-4 sm:px-0 overflow-x-auto"
	>
		<button
			*ngFor="let status of movieStatuses"
			(click)="filterByStatus(status)"
			[class]="
				selectedStatus === status
					? 'px-6 py-3 rounded-xl bg-gradient-to-r from-red-600 to-red-700 text-white font-bold shadow-lg border-2 border-red-500/50 transform scale-105 whitespace-nowrap'
					: 'px-6 py-3 rounded-xl bg-gray-800/80 backdrop-blur-sm text-gray-300 hover:bg-gray-700/80 hover:text-white border-2 border-gray-700/50 hover:border-gray-600/50 font-medium transition-all duration-300 hover:scale-105 whitespace-nowrap'
			"
		>
			<span class="flex items-center gap-2">
				<i
					class="text-sm"
					[ngClass]="
						status === 'Screening' ? 'pi pi-play-circle' : 'pi pi-clock'
					"
				></i>
				{{ status }}
			</span>
		</button>
	</div>

	<!-- Enhanced Mobile-Optimized Movie Grid -->
	<div
		class="enhanced-movie-grid movie-grid-container grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-3 sm:gap-4 md:gap-6 px-4 sm:px-0"
	>
		<app-movie-card
			*ngFor="let movie of filteredMovies"
			[movie]="movie"
			(buyTicketsClicked)="buyTickets($event)"
			(watchTrailerClicked)="watchTrailer($event)"
		></app-movie-card>
	</div>
</div>

<!-- YouTube Trailer Modal -->
<p-dialog
	[(visible)]="showTrailerModal"
	[modal]="true"
	[draggable]="false"
	[resizable]="false"
	[style]="{ width: '90vw', maxWidth: '1200px' }"
	styleClass="trailer-dialog"
	[dismissableMask]="true"
	(onHide)="closeTrailerModal()"
>
	<div class="relative w-full rounded-xl" style="padding-top: 56.25%">
		<iframe
			*ngIf="currentTrailerUrl"
			[src]="currentTrailerUrl"
			class="absolute top-0 left-0 w-full h-full rounded-xl"
			frameborder="0"
			allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
			allowfullscreen
			autoplay
		>
		</iframe>
	</div>
</p-dialog>
