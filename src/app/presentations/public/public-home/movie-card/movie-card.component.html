<!-- Enhanced Mobile-Optimized Movie Card -->
<div
	class="group movie-card bg-gradient-to-br from-gray-800/95 to-gray-900/95 backdrop-blur-sm rounded-2xl overflow-hidden shadow-xl hover:shadow-2xl transition-all duration-500 hover:-translate-y-1 md:hover:-translate-y-2 border border-gray-700/50 hover:border-red-600/30 relative"
	(click)="onMobileCardClick($event)"
>
	<!-- Enhanced Gradient Border Effect -->
	<div
		class="absolute inset-0 rounded-2xl bg-gradient-to-br from-red-600/20 via-transparent to-blue-600/20 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"
	></div>

	<!-- Movie Poster Section - Mobile Full Card -->
	<div
		class="relative aspect-[2/3] sm:aspect-[2/3] overflow-hidden rounded-2xl sm:rounded-t-2xl"
	>
		<!-- Enhanced Status Badge with Mobile Optimization -->
		<div class="absolute top-2 sm:top-3 left-2 sm:left-3 z-20">
			<div
				class="backdrop-blur-sm sm:backdrop-blur-md border rounded-lg sm:rounded-xl px-2 sm:px-3 py-1 sm:py-1.5 text-xs font-bold shadow-lg transition-all duration-300 group-hover:scale-105 sm:group-hover:scale-110"
				[ngClass]="getMovieStatusClass(movie.screeningStatus)"
			>
				<div class="flex items-center gap-1 sm:gap-1.5">
					<i
						class="text-xs"
						[ngClass]="getMovieStatusIcon(movie.screeningStatus)"
					></i>
					<span class="text-xs sm:text-xs">
						{{ getMovieStatusText(movie.screeningStatus) }}
					</span>
				</div>
			</div>
		</div>

		<!-- Movie Poster with Enhanced Mobile Hover -->
		<div class="relative overflow-hidden rounded-2xl sm:rounded-t-2xl">
			<img
				[src]="getMoviePotraitImage(movie)"
				[alt]="movie.name"
				class="w-full h-full object-cover transition-all duration-700 group-hover:scale-105 sm:group-hover:scale-110 group-hover:brightness-110"
			/>
			<!-- Mobile-Optimized Overlay -->
			<div
				class="absolute inset-0 bg-gradient-to-t from-black/70 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"
			></div>
		</div>

		<!-- Enhanced Mobile-Friendly Trailer Button -->
		<div class="absolute inset-0 flex items-center justify-center">
			<button
				*ngIf="movie.trailerURL"
				(click)="onWatchTrailer()"
				class="mobile-trailer-btn w-12 h-12 sm:w-16 sm:h-16 bg-black/70 backdrop-blur-sm sm:backdrop-blur-md border-2 border-white/30 rounded-full opacity-0 group-hover:opacity-100 transition-all duration-300 flex items-center justify-center hover:scale-110 hover:bg-red-600/80 hover:border-red-400/50 active:scale-95"
			>
				<i
					class="pi pi-play text-white text-base sm:text-xl ml-0.5 sm:ml-1"
				></i>
			</button>
		</div>

		<!-- Mobile-Only Action Button Overlay -->
		<div class="absolute bottom-2 right-2 sm:hidden z-20">
			<button
				(click)="onBuyTickets()"
				[disabled]="!isMovieBookable(movie.screeningStatus)"
				[class]="
					isMovieBookable(movie.screeningStatus)
						? 'mobile-action-overlay w-10 h-10 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold rounded-full transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-red-500/25 border border-red-500/30 flex items-center justify-center backdrop-blur-sm'
						: 'mobile-action-overlay w-10 h-10 bg-gradient-to-r from-gray-700 to-gray-800 text-gray-400 font-bold rounded-full cursor-not-allowed border border-gray-600/30 flex items-center justify-center backdrop-blur-sm opacity-60'
				"
			>
				<i
					class="text-sm"
					[ngClass]="
						isMovieBookable(movie.screeningStatus)
							? 'pi pi-ticket'
							: 'pi pi-clock'
					"
				></i>
			</button>
		</div>
	</div>

	<!-- Desktop-Only Card Content (Hidden on Mobile) -->
	<div class="hidden sm:block p-3 sm:p-4 md:p-5 relative z-10">
		<!-- Desktop Title -->
		<h3
			class="text-sm sm:text-base md:text-lg font-bold text-white mb-2 sm:mb-3 line-clamp-2 min-h-[2rem] sm:min-h-[2.5rem] md:min-h-[3.5rem] group-hover:text-red-100 transition-colors duration-300 leading-tight"
		>
			{{ movie.name }}
		</h3>

		<!-- Desktop Genre Tags -->
		<div class="flex flex-wrap gap-1 sm:gap-1.5 mb-3 sm:mb-4">
			<span
				*ngFor="let genre of movie.genres?.slice(0, 2)"
				class="px-2 sm:px-2.5 py-0.5 sm:py-1 bg-gradient-to-r from-green-600/80 to-green-700/80 backdrop-blur-sm text-white text-xs rounded-md sm:rounded-lg font-medium border border-green-500/30 group-hover:from-green-500/80 group-hover:to-green-600/80 transition-all duration-300"
			>
				{{ genre.name }}
			</span>
		</div>

		<!-- Desktop Movie Details and Action Button -->
		<div class="flex items-end justify-between gap-2">
			<!-- Desktop Movie Details -->
			<div
				class="text-xs sm:text-sm text-gray-400 space-y-0.5 sm:space-y-1 flex-shrink min-w-0"
			>
				<div class="flex items-center gap-1 sm:gap-1.5">
					<i class="pi pi-clock text-blue-400 text-xs flex-shrink-0"></i>
					<span class="font-medium truncate">{{
						formatDuration(movie.durationMin)
					}}</span>
				</div>
				<div class="flex items-center gap-1 sm:gap-1.5">
					<i class="pi pi-star-fill text-yellow-400 text-xs flex-shrink-0"></i>
					<span class="font-medium truncate">{{ movie.pgRating }}</span>
				</div>
			</div>

			<!-- Desktop Action Button -->
			<button
				(click)="onBuyTickets()"
				[disabled]="!isMovieBookable(movie.screeningStatus)"
				[class]="
					isMovieBookable(movie.screeningStatus)
						? 'mobile-action-btn px-3 sm:px-4 py-1.5 sm:py-2 bg-gradient-to-r from-red-600 to-red-700 hover:from-red-700 hover:to-red-800 text-white font-bold text-xs sm:text-sm rounded-md sm:rounded-lg transition-all duration-300 hover:scale-105 shadow-lg hover:shadow-red-500/25 border border-red-500/30 flex-shrink-0'
						: 'mobile-action-btn px-3 sm:px-4 py-1.5 sm:py-2 bg-gradient-to-r from-gray-700 to-gray-800 text-gray-400 font-bold text-xs sm:text-sm rounded-md sm:rounded-lg cursor-not-allowed border border-gray-600/30 flex-shrink-0'
				"
			>
				<span class="flex items-center gap-1 sm:gap-1.5 whitespace-nowrap">
					<i
						class="text-xs"
						[ngClass]="
							isMovieBookable(movie.screeningStatus)
								? 'pi pi-ticket'
								: 'pi pi-clock'
						"
					></i>
					<span>
						{{ getMovieButtonText(movie.screeningStatus) }}
					</span>
				</span>
			</button>
		</div>
	</div>
</div>
