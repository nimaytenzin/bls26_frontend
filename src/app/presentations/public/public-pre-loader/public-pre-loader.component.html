<div
	style="
		height: 100vh;
		width: 100vw;
		display: flex;
		align-items: center;
		justify-content: center;
		background-color: black;
		position: relative;
		overflow: hidden;
	"
>
	<!-- Content -->
	<div
		style="
			display: flex;
			flex-direction: column;
			align-items: center;
			z-index: 99;
			justify-content: center;
		"
	>
		<img src="logo.png" style="width: 200px" alt="" />
		<p style="font-size: xx-large; color: antiquewhite">Druk Cinema</p>
	</div>

	<!-- Background circles -->
	<div
		[ngStyle]="getTopCircleStyle()"
		style="
			height: 1400px;
			width: 1400px;
			border-radius: 50%;
			background: radial-gradient(
				circle at center,
				#6f1c76bc 0%,
				transparent 70%
			);
			position: absolute;
			top: -30%;
			left: -30%;
			filter: blur(2px);
		"
	></div>

	<div
		[ngStyle]="getBottomCircleStyle()"
		style="
			height: 1400px;
			width: 1400px;
			border-radius: 50%;
			background: radial-gradient(
				circle at center,
				#461ca8c4 0%,
				transparent 70%
			);
			position: absolute;
			bottom: -30%;
			right: -30%;
			filter: blur(2px);
		"
	></div>
</div>
