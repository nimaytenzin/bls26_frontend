<!-- Professional NSB Navbar -->
<nav
	class="fixed w-full z-[9998] top-0 left-0 transition-all duration-300"
	[class]="
		scrolled
			? 'bg-white/95 backdrop-blur-sm shadow-md border-b border-gray-200'
			: 'bg-white/90 backdrop-blur-sm border-b border-gray-100'
	"
>
	<div class="mx-auto px-4 sm:px-6 lg:px-2">
		<div class="flex items-center justify-between h-20">
			<!-- Logo and Brand Section -->
			<div
				class="flex items-center space-x-4 cursor-pointer group"
				(click)="navigateTo('/')"
			>
				<div class="flex items-center space-x-3">
					<img
						src="assets/images/nsb-logo.png"
						alt="NSB Logo"
						class="h-12 w-auto transition-transform duration-300 group-hover:scale-105"
						onerror="this.style.display='none'"
					/>
					<div class="flex flex-col">
						<span
							class="text-xl font-bold text-gray-900 tracking-tight leading-tight"
						>
							National Statistics Bureau
						</span>
						<span class="text-sm text-gray-600 font-medium">
							Royal Government of Bhutan
						</span>
					</div>
				</div>
			</div>

			<!-- Desktop Navigation -->
			<div class="hidden md:flex items-center space-x-8">
				<a
					*ngFor="let item of navItems"
					(click)="navigateTo(item.route)"
					class="text-gray-700 hover:text-gray-900 px-3 py-2 text-sm font-medium transition-colors duration-200 cursor-pointer relative"
					[class.text-gray-900]="isActiveRoute(item.route)"
					[class.font-semibold]="isActiveRoute(item.route)"
				>
					{{ item.label }}
					<div
						class="absolute bottom-0 left-0 w-0 h-0.5 bg-gray-900 transition-all duration-300"
						[class.w-full]="isActiveRoute(item.route)"
					></div>
				</a>
			</div>

			<!-- Desktop Login Button -->
			<div class="hidden md:flex items-center">
				<button
					(click)="goToLoginPage()"
					class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 hover:text-gray-900 rounded-md transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500"
				>
					<i class="pi pi-sign-in text-sm mr-2"></i>
					Login
				</button>
			</div>

			<!-- Mobile Menu Button -->
			<div class="md:hidden">
				<button
					(click)="toggleMenu()"
					class="inline-flex items-center justify-center p-2 rounded-md text-gray-700 hover:text-gray-900 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-gray-500 transition-colors duration-200"
					[attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'"
				>
					<div class="w-6 h-6 relative">
						<span
							class="absolute block w-6 h-0.5 bg-current top-2 rounded-sm transition-all duration-300"
							[class.rotate-45]="isMenuOpen"
							[class.top-3]="isMenuOpen"
						></span>
						<span
							class="absolute block w-6 h-0.5 bg-current top-3 rounded-sm transition-all duration-300"
							[class.opacity-0]="isMenuOpen"
						></span>
						<span
							class="absolute block w-6 h-0.5 bg-current top-4 rounded-sm transition-all duration-300"
							[class.-rotate-45]="isMenuOpen"
							[class.top-3]="isMenuOpen"
						></span>
					</div>
				</button>
			</div>
		</div>
	</div>

	<!-- Mobile Menu -->
	<div
		class="md:hidden"
		[class.block]="isMenuOpen"
		[class.hidden]="!isMenuOpen"
	>
		<div
			class="px-2 pt-2 pb-3 space-y-1 bg-white border-t border-gray-200 shadow-lg"
		>
			<a
				*ngFor="let item of navItems"
				(click)="navigateTo(item.route)"
				class="block px-3 py-2 text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50 rounded-md transition-colors duration-200 cursor-pointer"
				[class.text-gray-900]="isActiveRoute(item.route)"
				[class.bg-gray-100]="isActiveRoute(item.route)"
			>
				{{ item.label }}
			</a>
			<div class="border-t border-gray-200 pt-3">
				<button
					(click)="goToLoginPage()"
					class="block w-full text-left px-3 py-2 text-base font-medium text-gray-700 hover:text-gray-900 hover:bg-gray-50 rounded-md transition-colors duration-200"
				>
					<i class="pi pi-sign-in text-sm mr-2"></i>
					Login
				</button>
			</div>
		</div>
	</div>
</nav>

<!-- Spacer for fixed navbar -->
<div class="h-20" id="navbar-spacer"></div>
