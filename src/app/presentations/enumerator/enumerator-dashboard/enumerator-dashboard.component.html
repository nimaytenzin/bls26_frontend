<div class="enumerator-dashboard p-4 pb-6">
	<div class="mb-6">
		<h2 class="text-xl font-bold text-gray-800 mb-1">Select area</h2>
		<p class="text-sm text-gray-600">Choose Dzongkhag and Enumeration Area to open the map</p>
	</div>

	<div class="space-y-4 max-w-md">
		<div>
			<label class="block text-sm font-medium text-gray-700 mb-2">Dzongkhag</label>
			<p-dropdown
				[options]="dzongkhags"
				optionLabel="name"
				optionValue="id"
				[(ngModel)]="selectedDzongkhagId"
				placeholder="Select Dzongkhag"
				[loading]="loadingDzongkhags"
				(onChange)="onDzongkhagChange()"
				styleClass="w-full"
			></p-dropdown>
		</div>
		<div>
			<label class="block text-sm font-medium text-gray-700 mb-2">Enumeration Area</label>
			<p-dropdown
				[options]="enumerationAreas"
				optionLabel="name"
				optionValue="id"
				[(ngModel)]="selectedEaId"
				placeholder="Select EA"
				[loading]="loadingEas"
				[disabled]="!selectedDzongkhagId"
				styleClass="w-full"
			></p-dropdown>
		</div>
		<button
			pButton
			type="button"
			label="Open map"
			icon="pi pi-map"
			class="w-full"
			[disabled]="!canOpenMap()"
			(click)="openMap()"
			styleClass="p-button-primary"
			[style]="{ 'background-color': '#1A58AF', 'border-color': '#1A58AF' }"
		></button>
	</div>
</div>
