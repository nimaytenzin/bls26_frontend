<div class="enumerator-layout min-h-screen bg-gray-50 flex flex-col">
	<!-- Top Header -->
	<header
		*ngIf="showHeader"
		class="shadow-md sticky top-0 z-40 safe-area-top bg-white"
	>
		<div class="px-4 py-3 flex items-center justify-between">
			<!-- Logo/Title -->
			<div class="flex items-center gap-3">
				<img src="logo.png" alt="" class="w-8" />
				<div>
					<h1 class="text-lg font-bold leading-tight">BLS 2026</h1>
					<p class="text-xs text-primary-100">Enumerator</p>
				</div>
			</div>

			<!-- User Info -->
			<div class="flex items-center gap-3">
				<div class="text-right hidden sm:block">
					<p class="text-sm font-semibold">{{ currentUser?.name }}</p>
					<p class="text-xs text-primary-100">{{ currentUser?.phoneNumber }}</p>
				</div>
				<div
					class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm text-white"
					style="background-color: #1A58AF;"
				>
					{{ getUserInitials() }}
				</div>
			</div>
		</div>
	</header>

	<!-- Main Content Area -->
	<main [class.pb-20]="showBottomNav" [class.overflow-y-auto]="showBottomNav" class="flex-1">
		<router-outlet></router-outlet>
	</main>

	<!-- Bottom Navigation Bar: Home only (Past & Profile removed) -->
	<nav
		*ngIf="showBottomNav"
		class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg safe-area-bottom z-50"
	>
		<div class="flex justify-center h-16">
			<button
				(click)="navigateToTab('active')"
				[class.text-gray-500]="activeTab !== 'active'"
				class="flex flex-col items-center justify-center gap-1 px-8 hover:bg-gray-50 transition-colors active:bg-gray-100 relative"
				[style.color]="activeTab === 'active' ? '#1A58AF' : ''"
			>
				<i class="pi pi-briefcase text-xl"></i>
				<span class="text-xs font-medium" [class.font-semibold]="activeTab === 'active'">Active</span>
				<div *ngIf="activeTab === 'active'" class="absolute bottom-0 left-0 right-0 h-0.5" style="background-color: #1A58AF;"></div>
			</button>
		</div>
	</nav>
</div>
