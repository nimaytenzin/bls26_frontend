<div class="flex flex-col h-[100dvh] bg-slate-100 overflow-hidden">
	<p-toast position="top-center"></p-toast>

	<!-- Loading -->
	<div *ngIf="loading" class="flex flex-1 items-center justify-center min-h-0">
		<p-progressSpinner></p-progressSpinner>
	</div>

	<ng-container *ngIf="!loading">
		<!-- Header -->
		<header class="bg-[#1a58af] text-white flex items-center h-14 px-2 pt-[env(safe-area-inset-top,0px)] flex-shrink-0 shadow-sm">
			<button pButton type="button" icon="pi pi-arrow-left" class="p-button-text p-button-plain !text-white !p-2" (click)="cancel()"></button>
			<h1 class="flex-1 text-center text-[15px] font-semibold m-0 truncate">
				{{ isEdit ? 'Edit Household' : 'Add Household' }}
			</h1>
			<div class="w-10 flex-shrink-0" aria-hidden="true"></div>
		</header>

		<form class="flex-1 overflow-y-auto p-4 space-y-3" (ngSubmit)="submit()">
			<!-- Structure (hidden when pre-selected from map) -->
			<div *ngIf="!structureId" class="bg-white rounded-xl shadow-sm p-4">
				<p class="text-[11px] font-bold tracking-widest uppercase text-slate-400 mb-3">Structure</p>
				<div class="space-y-1">
					<label class="block text-sm font-medium text-gray-700">Structure <span class="text-red-500">*</span></label>
					<p-dropdown
						[options]="structures"
						optionLabel="structureNumber"
						optionValue="id"
						[(ngModel)]="form.structureId"
						name="structureId"
						(onChange)="onStructureChange()"
						styleClass="w-full"
						appendTo="body"
						placeholder="Select structure"
					></p-dropdown>
				</div>
			</div>

			<!-- Identification -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<p class="text-[11px] font-bold tracking-widest uppercase text-slate-400 mb-3">Identification</p>
				<div class="space-y-1 mb-3">
					<label class="block text-sm font-medium text-gray-700">Household ID <span class="text-red-500">*</span></label>
					<input pInputText [(ngModel)]="form.householdIdentification" name="householdIdentification" class="w-full" placeholder="e.g. HH-001" />
				</div>
				<div class="space-y-1">
					<label class="block text-sm font-medium text-gray-700">Serial number</label>
					<p-inputNumber
						[(ngModel)]="form.householdSerialNumber"
						name="householdSerialNumber"
						[min]="1"
						[showButtons]="true"
						buttonLayout="horizontal"
						incrementButtonIcon="pi pi-plus"
						decrementButtonIcon="pi pi-minus"
						incrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
						decrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
						styleClass="w-full"
						inputStyleClass="text-center font-semibold"
					></p-inputNumber>
				</div>
			</div>

			<!-- Head of household -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<p class="text-[11px] font-bold tracking-widest uppercase text-slate-400 mb-3">Head of household</p>
				<div class="space-y-1">
					<label class="block text-sm font-medium text-gray-700">Full name <span class="text-red-500">*</span></label>
					<input pInputText [(ngModel)]="form.nameOfHOH" name="nameOfHOH" class="w-full" placeholder="Enter full name" />
				</div>
			</div>

			<!-- Household members -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<p class="text-[11px] font-bold tracking-widest uppercase text-slate-400 mb-3">Household members</p>
				<div class="grid grid-cols-1 gap-3 mb-3">
					<div class="space-y-1">
						<label class="flex items-center gap-1 text-sm font-medium text-gray-700">
							<i class="pi pi-user text-blue-500 text-xs"></i> Male
						</label>
						<p-inputNumber
							[(ngModel)]="form.totalMale"
							name="totalMale"
							[min]="0"
							[showButtons]="true"
							buttonLayout="horizontal"
							incrementButtonIcon="pi pi-plus"
							decrementButtonIcon="pi pi-minus"
							incrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
							decrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
							styleClass="w-full"
							inputStyleClass="text-center font-semibold"
						></p-inputNumber>
					</div>
					<div class="space-y-1">
						<label class="flex items-center gap-1 text-sm font-medium text-gray-700">
							<i class="pi pi-user text-pink-500 text-xs"></i> Female
						</label>
						<p-inputNumber
							[(ngModel)]="form.totalFemale"
							name="totalFemale"
							[min]="0"
							[showButtons]="true"
							buttonLayout="horizontal"
							incrementButtonIcon="pi pi-plus"
							decrementButtonIcon="pi pi-minus"
							incrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
							decrementButtonClass="p-button-secondary p-button-outlined p-button-sm"
							styleClass="w-full"
							inputStyleClass="text-center font-semibold"
						></p-inputNumber>
					</div>
				</div>
				<div class="flex items-center justify-between bg-blue-50 rounded-lg px-4 py-2">
					<span class="text-sm text-gray-500">Total members</span>
					<span class="text-base font-bold text-[#1a58af]">
						{{ (form.totalMale || 0) + (form.totalFemale || 0) }}
					</span>
				</div>
			</div>

			<!-- Contact & notes -->
			<div class="bg-white rounded-xl shadow-sm p-4">
				<p class="text-[11px] font-bold tracking-widest uppercase text-slate-400 mb-3">Contact & notes</p>
				<div class="space-y-1 mb-3">
					<label class="block text-sm font-medium text-gray-700">Phone number</label>
					<input pInputText [(ngModel)]="form.phoneNumber" name="phoneNumber" class="w-full" type="tel" placeholder="+975 ..." />
				</div>
				<div class="space-y-1">
					<label class="block text-sm font-medium text-gray-700">Remarks</label>
					<textarea pInputTextarea [autoResize]="true" [(ngModel)]="form.remarks" name="remarks" class="w-full" rows="3" placeholder="Optional notes..."></textarea>
				</div>
			</div>

			<!-- Sticky footer actions -->
			<div class="sticky bottom-0 bg-white border-t border-slate-200 -mx-4 px-4 pt-3 pb-[calc(env(safe-area-inset-bottom,0px)+12px)] flex gap-2">
				<button pButton type="button" label="Cancel" class="p-button-outlined flex-1" (click)="cancel()" [disabled]="submitting"></button>
				<button
					pButton
					type="submit"
					[label]="isEdit ? 'Update' : 'Save household'"
					icon="pi pi-check"
					class="flex-1"
					[loading]="submitting"
					[style]="{ 'background-color': '#1A58AF', 'border-color': '#1A58AF' }"
				></button>
			</div>
		</form>
	</ng-container>
</div>
