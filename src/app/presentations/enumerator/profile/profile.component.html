<div class="profile-container">
	<!-- Profile Header -->
	<div class="profile-card">
		<div class="flex flex-col items-center text-center p-6">
			<!-- Avatar -->
			<div class="profile-avatar">
				{{ getUserInitials() }}
			</div>

			<!-- User Name -->
			<h2 class="text-2xl font-bold text-gray-800 mb-1">
				{{ currentUser?.name }}
			</h2>

			<!-- Role -->
			<p class="role-badge">
				Enumerator
			</p>
		</div>
	</div>

	<!-- User Details -->
	<div class="profile-card">
		<div class="p-6">
			<h3 class="text-lg font-semibold text-gray-800 mb-4">
				Personal Information
			</h3>

			<div class="space-y-4">
				<!-- CID -->
				<div class="info-section">
					<label>CID Number</label>
					<p>{{ currentUser?.cid || 'N/A' }}</p>
				</div>

				<!-- Email -->
				<div class="info-section">
					<label>Email Address</label>
					<p>{{ currentUser?.emailAddress || 'N/A' }}</p>
				</div>

				<!-- Phone -->
				<div class="info-section">
					<label>Phone Number</label>
					<p>{{ currentUser?.phoneNumber || 'N/A' }}</p>
				</div>

				<!-- Role -->
				<div class="info-section">
					<label>Role</label>
					<p>{{ currentUser?.role || 'N/A' }}</p>
				</div>
			</div>
		</div>
	</div>

	<!-- Actions -->
	<div class="space-y-3">
		<!-- Logout Button -->
		<button
			(click)="logout()"
			class="logout-button"
		>
			<i class="pi pi-sign-out mr-2"></i>
			<span>Logout</span>
		</button>
	</div>
</div>

<!-- Toast Messages -->
<p-toast></p-toast>
