<div class="ea-map-view">
	<!-- Loading -->
	<div *ngIf="loading" class="flex items-center justify-center flex-1 min-h-0">
		<p-progressSpinner></p-progressSpinner>
	</div>

	<!-- Error -->
	<div *ngIf="error && !loading" class="flex flex-1 min-h-0 items-center justify-center p-6">
		<div class="flex flex-col items-center">
			<p class="text-red-600 mb-4">{{ error }}</p>
			<button pButton label="Go back" icon="pi pi-arrow-left" (click)="goBack()"></button>
		</div>
	</div>

	<!-- Main: header + toolbar + map (mobile-app polish) -->
	<ng-container *ngIf="!loading && !error">
		<header class="flex-shrink-0 text-white safe-area-top">
			<div class="flex items-center h-14 px-2 gap-1">
				<button pButton type="button" icon="pi pi-arrow-left" class="p-button-text p-button-plain !text-white !p-2" (click)="goBack()"></button>
				<div class="flex-1 min-w-0">
					<h1 class="text-[15px] font-semibold truncate m-0 text-center leading-tight">{{ ea?.name || 'EA Map' }}</h1>
				</div>
				<div class="flex-shrink-0 pr-2">
					<p-tag *ngIf="eaCompleted" value="Completed" severity="success"></p-tag>
					<p-tag *ngIf="!eaCompleted" value="In progress" severity="warn"></p-tag>
				</div>
			</div>
		</header>

		<div class="bg-[#1a58af] map-controls-toolbar flex-shrink-0 flex items-center justify-between px-4 py-2 bg-white/90 backdrop-blur-md">
			<div class="flex items-center">
				<button
					*ngIf="!eaCompleted"
					pButton
					type="button"
					label="Mark Complete"
					icon="pi pi-check"
					class="p-button-success p-button-sm font-medium shadow-sm"
					(click)="openCompleteDialog()"
				></button>
			</div>
			<div class="flex items-center gap-3">
				<button
					pButton
					type="button"
					[icon]="editMode ? 'pi pi-times' : 'pi pi-plus'"
					class="p-button-rounded shadow-md transition-all"
					[class.p-button-danger]="editMode"
					[class.p-button-primary]="!editMode"
					[disabled]="eaCompleted"
					(click)="toggleEditMode()"
					[pTooltip]="editMode ? 'Cancel add structure' : 'Add structure'"
				></button>
				<button
					pButton
					type="button"
					icon="pi pi-list"					(click)="viewHouseholdList()"
					pTooltip="View household list"
				></button>
			</div>
		</div>

		<main class="ea-map-panel">
			<div #mapContainer class="map-container"></div>

			<!-- Floating map controls: zoom to extent & zoom to location -->
			<div class="map-fab-controls">
				<button
					class="map-fab"
					(click)="zoomToExtent()"
					pTooltip="Zoom to extent"
					tooltipPosition="left"
					title="Zoom to extent"
				>
					<i class="pi pi-expand"></i>
				</button>
				<button
					class="map-fab"
					[class.map-fab--locating]="locating"
					(click)="zoomToLocation()"
					pTooltip="Zoom to my location"
					tooltipPosition="left"
					title="Zoom to my location"
					[disabled]="locating"
				>
					<i [class]="locating ? 'pi pi-spin pi-spinner' : 'pi pi-map-marker'"></i>
				</button>
			</div>

			<div class="leaflet-safe-area-spacer" aria-hidden="true"></div>
		</main>

		<!-- Toast (above Leaflet UI) -->
		<div
			*ngIf="toastMessage"
			class="absolute top-24 left-4 right-4 rounded-lg shadow-lg p-3 text-white text-sm toast-overlay"
			[ngClass]="{
				'bg-green-600': toastSeverity === 'success',
				'bg-red-600': toastSeverity === 'error',
				'bg-blue-600': toastSeverity === 'info'
			}"
		>
			{{ toastMessage }}
		</div>
	</ng-container>

	<!-- Add structure dialog -->
	<p-dialog
		[(visible)]="showAddStructureDialog"
		header="Add structure"
		[modal]="true"
		[closable]="!isAddingStructure"
		(onHide)="closeAddStructureDialog()"
	>
		<div class="space-y-3">
			<p *ngIf="clickedLatLng" class="text-sm text-gray-600">
				Lat: {{ clickedLatLng.lat | number:'1.4-4' }}, Lng: {{ clickedLatLng.lng | number:'1.4-4' }}
			</p>
			<div>
				<label class="block text-sm font-medium mb-1">Structure number</label>
				<input pInputText [(ngModel)]="newStructureNumber" class="w-full" />
			</div>
		</div>
		<ng-template pTemplate="footer">
			<button pButton label="Cancel" class="p-button-text" (click)="closeAddStructureDialog()" [disabled]="isAddingStructure"></button>
			<button pButton label="Add" (click)="createStructure()" [loading]="isAddingStructure" [disabled]="!newStructureNumber.trim()"></button>
		</ng-template>
	</p-dialog>

	<!-- Structure actions dialog -->
	<p-dialog
		[(visible)]="showStructureActionsDialog"
		[header]="'Structure: ' + (selectedStructure?.structureNumber || '')"
		[modal]="true"
		[closable]="true"
		(onHide)="showStructureActionsDialog = false"
	>
		<div *ngIf="selectedStructure" class="flex flex-col gap-2">
			<button pButton label="Add household" icon="pi pi-plus" (click)="addHousehold()"></button>
			<button pButton label="View households" icon="pi pi-list" class="p-button-outlined" (click)="viewHouseholdsForStructure()"></button>
			<button
				pButton
				label="Edit structure number"
				icon="pi pi-pencil"
				class="p-button-outlined"
				(click)="openEditStructureNumber()"
				[disabled]="eaCompleted"
			></button>
			<button *ngIf="!eaCompleted" pButton label="Delete structure" icon="pi pi-trash" class="p-button-danger p-button-outlined" (click)="deleteStructure()"></button>
		</div>
	</p-dialog>

	<!-- Edit structure number dialog -->
	<p-dialog
		[(visible)]="showEditStructureNumberDialog"
		header="Edit structure number"
		[modal]="true"
		[closable]="!isAddingStructure"
		(onHide)="showEditStructureNumberDialog = false"
	>
		<div class="space-y-3" *ngIf="selectedStructure">
			<p class="text-sm text-gray-600">
				Current: <span class="font-semibold">{{ selectedStructure.structureNumber }}</span>
			</p>
			<div>
				<label class="block text-sm font-medium mb-1">New structure number</label>
				<input pInputText [(ngModel)]="editStructureNumber" class="w-full" />
			</div>
		</div>
		<ng-template pTemplate="footer">
			<button
				pButton
				label="Cancel"
				class="p-button-text"
				(click)="showEditStructureNumberDialog = false"
				[disabled]="isAddingStructure"
			></button>
			<button
				pButton
				label="Save"
				(click)="updateStructureNumber()"
				[loading]="isAddingStructure"
				[disabled]="!editStructureNumber.trim()"
			></button>
		</ng-template>
	</p-dialog>

	<!-- Complete EA dialog -->
	<p-dialog
		[(visible)]="showCompleteDialog"
		header="Mark EA complete"
		[modal]="true"
		[closable]="!isCompleting"
		(onHide)="showCompleteDialog = false"
	>
		<p>Mark this enumeration area as completed? You can no longer add structures after this.</p>
		<ng-template pTemplate="footer">
			<button pButton label="Cancel" class="p-button-text" (click)="showCompleteDialog = false" [disabled]="isCompleting"></button>
			<button pButton label="Complete" class="p-button-success" (click)="markComplete()" [loading]="isCompleting"></button>
		</ng-template>
	</p-dialog>

	<p-confirmDialog></p-confirmDialog>
</div>
