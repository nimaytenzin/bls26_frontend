<!-- Toast Messages -->
<p-toast></p-toast>

<!-- User Management -->
<div class="h-[calc(100vh-5rem)] bg-slate-50 flex flex-col">
	<!-- Header Section -->
	<div class="bg-white border-b border-slate-200 shadow-sm flex-shrink-0">
		<div class="p-6">
			<div class="flex justify-between items-center mb-6">
				<div>
					<h1 class="text-3xl font-bold text-slate-900 mb-1">
						User Management
					</h1>
					<p class="text-sm text-slate-500">
						Manage users across all roles: Admins, Supervisors, Enumerators, and General Users
					</p>
				</div>

				<!-- Action Buttons -->
				<div class="flex items-center gap-3">
					<button
						pButton
						type="button"
						label="Refresh All"
						icon="pi pi-refresh"
						size="small"
						[loading]="
							loadingAdmins || loadingSupervisors || loadingEnumerators || loadingGeneralUsers
						"
						[disabled]="
							loadingAdmins || loadingSupervisors || loadingEnumerators || loadingGeneralUsers
						"
						(click)="loadAllUsers()"
					></button>
				</div>
			</div>

			<!-- Stats Section -->
			<div class="grid grid-cols-4 gap-4">
				<div
					class="bg-slate-50 border border-slate-200 rounded-lg p-4 hover:border-slate-300 hover:shadow-sm transition-all"
				>
					<div
						class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1"
					>
						Admins
					</div>
					<div class="text-3xl font-bold text-slate-900">
						{{ adminsCount }}
					</div>
				</div>
				<div
					class="bg-slate-50 border border-slate-200 rounded-lg p-4 hover:border-slate-300 hover:shadow-sm transition-all"
				>
					<div
						class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1"
					>
						Supervisors
					</div>
					<div class="text-3xl font-bold text-slate-900">
						{{ supervisorsCount }}
					</div>
				</div>
				<div
					class="bg-slate-50 border border-slate-200 rounded-lg p-4 hover:border-slate-300 hover:shadow-sm transition-all"
				>
					<div
						class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1"
					>
						Enumerators
					</div>
					<div class="text-3xl font-bold text-slate-900">
						{{ enumeratorsCount }}
					</div>
				</div>
				<div
					class="bg-slate-50 border border-slate-200 rounded-lg p-4 hover:border-slate-300 hover:shadow-sm transition-all"
				>
					<div
						class="text-xs font-medium text-slate-500 uppercase tracking-wide mb-1"
					>
						General Users
					</div>
					<div class="text-3xl font-bold text-slate-900">
						{{ generalUsersCount }}
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Content Area -->
	<div class="flex-1 flex flex-col p-6">
		<!-- Tab View for Role-based Management -->
		<div
			class="flex-1 flex flex-col overflow-hidden bg-white rounded-lg border border-slate-200 shadow-sm"
		>
			<p-tabView [(activeIndex)]="activeTabIndex" class="flex-1 flex flex-col">
				<!-- Admins Tab -->
				<p-tabPanel>
					<ng-template pTemplate="header">
						<span>Admins</span>
					</ng-template>
					<app-admin-user-admin-list
						[searchValue]="searchValue"
						(searchValueChange)="searchValue = $event"
						[(selectedUser)]="selectedUser"
						(loadingChange)="onLoadingAdminsChange($event)"
						(usersCountChange)="onAdminsCountChange($event)"
						(add)="openCreateAdminDialog()"
						(viewProfile)="openProfileViewDialog($event)"
						(edit)="openEditDialog($event)"
						(resetPassword)="openResetPasswordDialog($event)"
						(deactivate)="deactivateUser($event.user, $event.event)"
						(activate)="activateUser($event.user, $event.event)"
					></app-admin-user-admin-list>
				</p-tabPanel>

				<!-- Supervisors Tab -->
				<p-tabPanel>
					<ng-template pTemplate="header">
						<span>Supervisors</span>
					</ng-template>
					<app-admin-user-supervisor-list
						[searchValue]="searchValue"
						(searchValueChange)="searchValue = $event"
						[(selectedUser)]="selectedUser"
						(loadingChange)="onLoadingSupervisorsChange($event)"
						(usersCountChange)="onSupervisorsCountChange($event)"
						(add)="openCreateSupervisorDialog()"
						(viewProfile)="openProfileViewDialog($event)"
						(edit)="openEditDialog($event)"
						(resetPassword)="openResetPasswordDialog($event)"
						(deactivate)="deactivateUser($event.user, $event.event)"
						(activate)="activateUser($event.user, $event.event)"
						(assignDzongkhag)="openAssignDzongkhagDialog($event)"
						(deleteUser)="deleteSupervisor($event.user, $event.event)"
					></app-admin-user-supervisor-list>
				</p-tabPanel>

				<!-- Enumerators Tab -->
				<p-tabPanel>
					<ng-template pTemplate="header">
						<span>Enumerators</span>
					</ng-template>
					<app-admin-user-enumerator-list
						[searchValue]="searchValue"
						(searchValueChange)="searchValue = $event"
						[(selectedUser)]="selectedUser"
						(loadingChange)="onLoadingEnumeratorsChange($event)"
						(usersCountChange)="onEnumeratorsCountChange($event)"
						(viewProfile)="openProfileViewDialog($event)"
						(edit)="openEditDialog($event)"
						(resetPassword)="openResetPasswordDialog($event)"
						(deactivate)="deactivateUser($event.user, $event.event)"
						(activate)="activateUser($event.user, $event.event)"
					></app-admin-user-enumerator-list>
				</p-tabPanel>

				<!-- General Users Tab -->
				<p-tabPanel>
					<ng-template pTemplate="header">
						<span>General Users</span>
					</ng-template>
					<app-admin-user-general-list
						[searchValue]="searchValue"
						(searchValueChange)="searchValue = $event"
						[(selectedUser)]="selectedUser"
						(loadingChange)="onLoadingGeneralUsersChange($event)"
						(usersCountChange)="onGeneralUsersCountChange($event)"
						(add)="openCreateGeneralUserDialog()"
						(viewProfile)="openProfileViewDialog($event)"
						(edit)="openEditDialog($event)"
						(resetPassword)="openResetPasswordDialog($event)"
						(deactivate)="deactivateUser($event.user, $event.event)"
						(activate)="activateUser($event.user, $event.event)"
					></app-admin-user-general-list>
				</p-tabPanel>
			</p-tabView>
		</div>
	</div>
</div>

<!-- Confirmation Dialog -->
<p-confirmDialog></p-confirmDialog>
