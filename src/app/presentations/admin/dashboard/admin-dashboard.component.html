<div class="flex gap-6 align-items-center justify-content-center px-4">
    <div class="w-8">
        <div class="flex gap-4 my-4 justify-content-between align-items-end">
            <p>
                Welcome Kinley Wangyel
            </p>
        </div>
        <p-divider type="dashed"></p-divider>

        <div class="flex gap-3 my-4">
            <div class="flex-1 border-1 surface-border border-round-md p-2">
                <p class="text-xl font-bold">Payments</p>
                <p-divider type="dashed"></p-divider>
                <div class="text-left">
                    <p class="text-l">
                        Collected payments
                    </p>

                    <p class="text-xl">
                        <strong>BTN. 150,000</strong>
                    </p>
                    <br>
                    <p-progressBar [value]="80" color="darkseagreen" />
                </div>
            </div>
            <div class="flex-1 border-1 surface-border border-round-md p-2">
                <p class="text-xl font-bold">Stats</p>
                <p-divider type="dashed"></p-divider>
                <div class="text-left">
                    <p class="text-l">
                        Total Students
                    </p>
                    <p><strong>100</strong></p>
                    <p class="text-l">
                        Facilitators
                    </p>
                    <p><strong>5</strong></p>
                </div>
            </div>
        </div>

        <!-- <div class="flex justify-content-between gap-3 my-4"> -->

        <div class="flex gap-2">
            <!-- <div class="border-1 w-4 surface-border border-round-md p-2">
                <app-admin-dashboard-pending-payment-list></app-admin-dashboard-pending-payment-list>
            </div> -->
            <div class="border-1 w-12 surface-border border-round-md p-2">
                <app-admin-dashboard-lease-action-summary></app-admin-dashboard-lease-action-summary>
            </div>
        </div>
        <br>

        <div class="flex gap-2">
            <div class="flex-1 border-1 surface-border border-round-md p-2">
                <p class="text-xl font-bold">Pricing Charts</p>
                <p-divider type="dashed"></p-divider>
                <table class="w-full">
                    <thead>
                        <tr>
                            <th class="text-left">Package</th>
                            <th class="text-left">Price</th>
                        </tr>
                    </thead>
                    <p-divider class="w-full"></p-divider>
                    <tbody>
                        <tr>
                            <td>Yearly</td>
                            <td>BTN. 10,000</td>
                        </tr>
                        <p-divider type="dashed "></p-divider>
                        <tr>
                            <td>3 month</td>
                            <td>BTN. 5,000</td>
                        </tr>
                        <p-divider type="dashed "></p-divider>
                        <tr>
                            <td>Monthly</td>
                            <td>BTN. 3,000</td>
                        </tr>
                    </tbody>
                </table>

            </div>
        </div>
    </div>

    <!-- <div class="flex-1">
        <app-admin-dashboard-damage-items></app-admin-dashboard-damage-items>
    </div> -->
</div>
<br><br>
