<div class="mt-4">
    <p class="text-xl font-semibold">Open Invoices</p>
    <p-divider type="dashed"></p-divider>

    <div>
        <div class="flex align-items-center mb-2 justify-content-between">
            <div>
                <p>
                    Showing {{ paginatedUpcomingExpiryLease.data.length }} of
                    {{ paginatedUpcomingExpiryLease.count }} Entries
                </p>
            </div>
            <div class="">
                <p-paginator
                    (onPageChange)="onPageChange($event)"
                    [first]="firstPageNumber"
                    [rows]="rows"
                    [totalRecords]="paginatedUpcomingExpiryLease.count"
                    [rowsPerPageOptions]="rowsPerPageOptions"
                    [showFirstLastIcon]="true"
                    #paginator
                ></p-paginator>
            </div>
        </div>
        <div>
            <p-table
                [value]="paginatedUpcomingExpiryLease.data"
                styleClass="p-datatable-striped mb-2"
            >
                <ng-template pTemplate="header">
                    <tr>
                        <th>Name</th>
                        <th>Amount</th>
                        <th>Package</th>
                        <th>Due Date</th>
                        <th></th>
                    </tr>
                </ng-template>
                <ng-template pTemplate="body" let-item>
                    <tr>
                        <td>
                            {{ item.name }}
                        </td>
                        <td>
                            {{ item.amount}}
                        </td>
                        <td>
                            {{ item.package}}
                        </td>
                        <td>
                            {{ item.dueDate}}
                        </td>
                    </tr>
                </ng-template>
            </p-table>

        </div>
    </div>
</div>
