<!-- admin-master-students.component.html -->
<div class="student-management-container p-m-4">
    <!-- Main Content -->
    <div class="p-grid">
        <!-- Student List -->
        <div class="p-col-12">
            <div class="p-card">
                <div class="p-d-flex p-jc-between p-ai-center p-p-3">
                    <h3>Student Records</h3>
                    <div>
                        <button
                            pButton
                            icon="pi pi-filter"
                            label="Filter"
                            class="p-button-text"
                        ></button>
                        <button
                            pButton
                            icon="pi pi-refresh"
                            label="Refresh"
                            class="p-button-text p-ml-2"
                        ></button>
                    </div>
                </div>

                <p-table
                    [value]="students"
                    [paginator]="true"
                    [rows]="10"
                    [responsive]="true"
                >
                    <ng-template pTemplate="header">
                        <tr>
                            <th>Photo</th>
                            <th>Details</th>
                            <th>CID</th>
                            <th>Today's Status</th>
                            <th>Mood</th>
                            <th>Actions</th>
                        </tr>
                    </ng-template>
                    <ng-template pTemplate="body" let-student>
                        <tr>
                            <td>
                                <img
                                    [src]="
                                        student.image ||
                                        'assets/images/tshotsho.jpeg'
                                    "
                                    alt="Student"
                                    class="student-image"
                                />
                            </td>
                            <td>
                                <div class="student-details">
                                    <strong>{{ student.fullName }}</strong>
                                    <small>{{ student.preferredName }}</small>
                                    <div>
                                        {{ student.dob | date : "dd MMM yyyy" }}
                                    </div>
                                    <div class="text-sm">
                                        {{ student.classroom }}
                                    </div>
                                </div>
                            </td>
                            <td>{{ student.cid }}</td>
                            <td>
                                <p-tag
                                    [severity]="
                                        getAttendanceSeverity(
                                            student.attendance
                                        )
                                    "
                                    [style]="{
                                        'min-width': '70px',
                                        'text-align': 'center'
                                    }"
                                ></p-tag>
                                <div class="text-xs mt-1">
                                    {{
                                        getAttendanceStatus(student.attendance)
                                    }}
                                </div>
                            </td>
                            <td>
                                <div class="flex align-items-center gap-2">
                                    <i
                                        [class]="getMoodIcon(student.mood)"
                                        [style.color]="
                                            getMoodColor(student.mood)
                                        "
                                    ></i>
                                    <span>{{ student.mood | titlecase }}</span>
                                </div>
                            </td>
                            <td>
                                <div class="action-buttons">
                                    <button
                                        pButton
                                        icon="pi pi-eye"
                                        pTooltip="View"
                                        tooltipPosition="top"
                                        (click)="viewStudent(student)"
                                    ></button>
                                    <button
                                        pButton
                                        icon="pi pi-pencil"
                                        pTooltip="Edit"
                                        tooltipPosition="top"
                                        (click)="openDialog(student)"
                                    ></button>
                                    <button
                                        pButton
                                        icon="pi pi-trash"
                                        pTooltip="Delete"
                                        tooltipPosition="top"
                                        (click)="deleteStudent(student.id)"
                                    ></button>
                                </div>
                            </td>
                        </tr>
                    </ng-template>
                </p-table>
            </div>
        </div>
    </div>

    <!-- Dialogs -->
    <p-dialog
        [(visible)]="showDialog"
        [style]="{ width: '70vw' }"
        [modal]="true"
    >
        <!-- ... existing dialog content ... -->
    </p-dialog>

    <!-- View Student Card Dialog -->
    <p-dialog
        [(visible)]="showViewDialog"
        [style]="{ width: '800px' }"
        [modal]="true"
        [closable]="true"
        header="Student Report Card – Sonam Dechen Tshogyal"
    >
    </p-dialog>
</div>
