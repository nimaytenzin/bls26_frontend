<!-- Map Container -->
<div class="flex-1 relative rounded-lg overflow-hidden shadow-sm h-full">
	<!-- Map Container -->
	<div
		id="enumerationAreaMap"
		class="w-full h-full bg-slate-100"
		[style.height]="'100%'"
		[style.min-height]="'400px'"
		[class.opacity-60]="loading"
		[class.pointer-events-none]="loading"
	></div>

	<!-- Popovers for Download and Filter (Top Left) -->
	<div class="absolute top-4 left-4 flex gap-2 z-[1001]">
		<!-- Download Popover -->
		<p-button
			(click)="downloadPopover.toggle($event)"
			icon="pi pi-save"
			severity="secondary"
			[label]="'Download'"
			size="small"
		/>
		<p-popover #downloadPopover>
			<div class="flex flex-col gap-3 w-[18rem]">
				<div>
					<span class="font-semibold text-slate-900 block mb-3 text-sm">
						Download Data
					</span>
					<div class="flex flex-col gap-2">
						<button
							type="button"
							(click)="onDownloadHouseholdData(); downloadPopover.hide()"
							class="w-full px-3 py-2 bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold rounded transition flex items-center justify-center gap-2"
						>
							<i class="pi pi-download text-xs"></i>
							Export Household CSV
						</button>
					</div>
				</div>
				<div class="border-t border-slate-200 pt-3">
					<span class="font-semibold text-slate-900 block mb-2 text-sm">
						Spatial Data
					</span>
					<div class="space-y-2">
						<!-- EA Zones -->
						<div class="flex items-center justify-between text-sm">
							<span class="text-slate-700">Enumeration Area</span>
							<div class="flex gap-1">
								<button
									type="button"
									(click)="onDownloadKML(); downloadPopover.hide()"
									class="px-2 py-1 text-xs text-slate-600 hover:text-primary-600"
									title="Download KML"
								>
									KML
								</button>
								<button
									type="button"
									(click)="onDownloadGeoJSON(); downloadPopover.hide()"
									class="px-2 py-1 text-xs text-slate-600 hover:text-primary-600"
									title="Download GeoJSON"
								>
									GEOJSON
								</button>
							</div>
						</div>
					</div>
				</div>
			</div>
		</p-popover>

		<!-- Filter/Navigation Popover -->
		<p-button
			(click)="filterPopover.toggle($event)"
			icon="pi pi-filter"
			severity="secondary"
			size="small"
			[label]="'Filter Location'"
		/>
		<p-popover #filterPopover>
			<div class="flex flex-col gap-3 w-[20rem]">
				<div>
					<span class="font-semibold text-slate-900 block mb-3 text-sm">
						Navigate to Location
					</span>

					<div class="space-y-3">
						<!-- Dzongkhag Dropdown -->
						<div>
							<label
								class="block text-xs font-semibold text-slate-700 mb-1"
							>
								Dzongkhag
							</label>
							<p-dropdown
								[options]="dzongkhagOptions"
								[(ngModel)]="selectedDzongkhag"
								placeholder="Select Dzongkhag"
								optionLabel="label"
								optionValue="value"
								(onChange)="onDzongkhagChange(); dzongkhagChange.emit(selectedDzongkhag)"
								[showClear]="true"
								styleClass="w-full"
							></p-dropdown>
						</div>

						<!-- Admin Zone Dropdown -->
						<div>
							<label
								class="block text-xs font-semibold text-slate-700 mb-1"
							>
								Administrative Zone
							</label>
							<p-dropdown
								[options]="adminZoneOptions"
								[(ngModel)]="selectedAdminZone"
								placeholder="Select Admin Zone"
								optionLabel="label"
								optionValue="value"
								(onChange)="onAdminZoneChange(); adminZoneChange.emit(selectedAdminZone)"
								[disabled]="
									!selectedDzongkhag || adminZoneOptions.length === 0
								"
								[showClear]="true"
								styleClass="w-full"
							></p-dropdown>
						</div>

						<!-- Sub Admin Zone Dropdown -->
						<div>
							<label
								class="block text-xs font-semibold text-slate-700 mb-1"
							>
								Sub Administrative Zone
							</label>
							<p-dropdown
								[options]="subAdminZoneOptions"
								[(ngModel)]="selectedSubAdminZone"
								placeholder="Select Sub Admin Zone"
								optionLabel="label"
								optionValue="value"
								(onChange)="onSubAdminZoneChange(); subAdminZoneChange.emit(selectedSubAdminZone)"
								[disabled]="
									!selectedAdminZone || subAdminZoneOptions.length === 0
								"
								[showClear]="true"
								styleClass="w-full"
							></p-dropdown>
						</div>

						<!-- EA Dropdown -->
						<div>
							<label
								class="block text-xs font-semibold text-slate-700 mb-1"
							>
								Enumeration Area
							</label>
							<p-dropdown
								[options]="eaOptions"
								[(ngModel)]="selectedEAFilter"
								placeholder="Select EA"
								optionLabel="label"
								optionValue="value"
								[disabled]="
									!selectedSubAdminZone || eaOptions.length === 0
								"
								[showClear]="true"
								styleClass="w-full"
							></p-dropdown>
						</div>

						<!-- Navigate Button -->
						<div class="pt-2">
							<button
								type="button"
								(click)="submitNavigation(); filterPopover.hide()"
								[disabled]="!selectedDzongkhag"
								class="w-full px-3 py-2 bg-primary-600 hover:bg-primary-700 text-white text-xs font-semibold rounded transition disabled:bg-slate-300 disabled:cursor-not-allowed flex items-center justify-center gap-2"
							>
								<i class="pi pi-map-marker"></i>
								Navigate to Location
							</button>
						</div>
					</div>
				</div>
			</div>
		</p-popover>
	</div>

	<!-- Map Controls Overlay -->
	<div
		class="absolute top-4 right-4 bg-white rounded-lg border border-slate-200 shadow-lg p-3 space-y-3 z-[1000]"
	>
		<div>
			<p class="text-sm font-semibold text-slate-700 mb-2">Map Controls</p>

			<!-- Basemap Selector -->
			<div class="mb-3">
				<label class="text-xs text-slate-600 mb-1 block">Basemap:</label>
				<select
					[(ngModel)]="selectedBasemapId"
					(change)="switchBasemap()"
					class="w-full text-sm border border-slate-300 rounded px-2 py-1.5 focus:outline-none focus:ring-2 focus:ring-primary-500"
				>
					<ng-container
						*ngFor="let category of basemapCategories | keyvalue"
					>
						<optgroup [label]="$any(category.value).label">
							<option
								*ngFor="let basemap of $any(category.value).basemaps"
								[value]="basemap.id"
							>
								{{ basemap.name }}
							</option>
						</optgroup>
					</ng-container>
				</select>
			</div>
		</div>

		<!-- Layer Management Panel -->
		<div class="pt-3 border-t border-slate-200">
			<p class="text-sm font-semibold text-slate-700 mb-2">Layers</p>
			<div class="space-y-2">
				<!-- Enumeration Area Layer -->
				<div class="flex items-center justify-between gap-2">
					<span class="text-xs text-slate-600">Enumeration Area</span>
					<p-inputSwitch
						[(ngModel)]="showEALayer"
						(onChange)="toggleEALayer()"
					/>
				</div>

				<!-- Sub-Admin Zone Layer -->
				<div class="flex items-center justify-between gap-2">
					<span class="text-xs text-slate-600">Sub-Admin Zone</span>
					<p-inputSwitch
						[(ngModel)]="showSubAdminLayer"
						(onChange)="toggleSubAdminLayer()"
					/>
				</div>

				<!-- Structures Layer -->
				<div class="flex items-center justify-between gap-2">
					<span class="text-xs text-slate-600">Structure (Survey Structure points)</span>
					<p-inputSwitch
						[(ngModel)]="showStructures"
						(onChange)="toggleStructuresLayer()"
					/>
				</div>

				<!-- Buildings Layer -->
				<div class="flex items-center justify-between gap-2">
					<span class="text-xs text-slate-600">Zhichar Building</span>
					<p-inputSwitch
						[(ngModel)]="showBuildings"
						(onChange)="toggleBuildings()"
					/>
				</div>
			</div>
		</div>
	</div>

	<!-- Loading Overlay -->
	<div
		*ngIf="loading"
		class="absolute inset-0 bg-white bg-opacity-75 flex items-center justify-center"
	>
		<p-progressSpinner styleClass="w-12 h-12"></p-progressSpinner>
	</div>
</div>
