<div class="p-fluid">
    <div class="field">
        <label for="facilityName">Facility Name</label>
        <input id="facilityName" type="text" pInputText [(ngModel)]="name" placeholder="Enter facility name" required />
    </div>

    <div class="field">
        <label for="facilityAddress">Description</label>
        <input id="description" type="text" pInputText [(ngModel)]="description" placeholder="Enter Description" />
    </div>

    <div class="field">
        <label for="facilityAddress">Address</label>
        <input id="facilityAddress" type="text" pInputText [(ngModel)]="address" placeholder="Enter address" required />
    </div>

    <div class="field">
        <label for="facilityContact">Contact</label>
        <input type="number" pInputText [(ngModel)]="contact" placeholder="Enter contact number" required />
    </div>

    <div class="field">
        <label for="facilityCapacity">Capacity</label>
        <input type="number" pInputText [(ngModel)]="capacity" placeholder="Enter capacity" required />
    </div>

    <div class="flex justify-content-end gap-2">
        <button pButton type="button" class="p-button p-button-rounded p-button-success justify-content-center" label="Close"
            (click)="close()"></button>
        <button pButton type="button" class="p-button p-button-rounded p-button-danger justify-content-center" label="Add"
            (click)="saveFacility()"></button>
    </div>
</div>
