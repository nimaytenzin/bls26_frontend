<!-- transaction-form.component.html -->
<div class="p-fluid">
    <div class="field">
        <label for="type">Transaction Type</label>
        <p-inputSwitch
            [(ngModel)]="isIncome"
            (onChange)="transaction.type = isIncome ? 'income' : 'expense'"
            [ngModelOptions]="{ standalone: true }"
        >
            <ng-template pTemplate="checked">Income</ng-template>
            <ng-template pTemplate="unchecked">Expense</ng-template>
        </p-inputSwitch>
    </div>

    <div class="field">
        <label for="date">Date</label>
        <p-calendar
            [(ngModel)]="transaction.date"
            name="date"
            dateFormat="mm/dd/yy"
            [showIcon]="true"
        >
        </p-calendar>
    </div>

    <div class="field">
        <label for="description">Description*</label>
        <input
            type="text"
            pInputText
            [(ngModel)]="transaction.description"
            name="description"
            required
            placeholder="Enter transaction description"
        />
    </div>

    <div class="field">
        <label for="amount">Amount*</label>
        <p-inputNumber
            [(ngModel)]="transaction.amount"
            name="amount"
            mode="currency"
            currency="USD"
            locale="en-US"
            required
            placeholder="Enter amount"
        >
        </p-inputNumber>
    </div>

    <div class="field">
        <label for="category">Category*</label>
        <p-dropdown
            [(ngModel)]="transaction.category"
            [options]="isIncome ? incomeCategories : expenseCategories"
            name="category"
            required
            placeholder="Select category"
        >
        </p-dropdown>
    </div>

    <div class="field">
        <label for="status">Status</label>
        <p-dropdown
            [(ngModel)]="transaction.status"
            [options]="statusOptions"
            name="status"
            placeholder="Select status"
        >
        </p-dropdown>
    </div>

    <div class="field">
        <label for="paymentMethod">Payment Method</label>
        <p-dropdown
            [(ngModel)]="transaction.paymentMethod"
            [options]="paymentMethods"
            name="paymentMethod"
            placeholder="Select payment method"
        >
        </p-dropdown>
    </div>

    <div class="field">
        <label for="receiptNumber">Receipt Number</label>
        <input
            type="text"
            pInputText
            [(ngModel)]="transaction.receiptNumber"
            name="receiptNumber"
            placeholder="Enter receipt number"
        />
    </div>

    <div class="field">
        <label for="notes">Notes</label>
        <textarea
            pInputTextarea
            [(ngModel)]="transaction.notes"
            name="notes"
            [rows]="3"
            placeholder="Additional notes"
        >
        </textarea>
    </div>

    <div class="flex justify-content-end gap-2 mt-4">
        <button
            pButton
            pRipple
            type="button"
            label="Cancel"
            class="p-button-text"
            (click)="cancel()"
        ></button>
        <button
            pButton
            pRipple
            type="button"
            label="Save"
            class="p-button-primary"
            (click)="saveTransaction()"
        ></button>
    </div>
</div>
