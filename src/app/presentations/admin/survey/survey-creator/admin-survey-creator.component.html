<div class="survey-creator-container p-6">
	<!-- Header -->
	<div class="mb-6">
		<div class="flex items-center justify-between">
			<div>
				<h1 class="text-3xl font-bold text-gray-900 mb-2">Create New Survey</h1>
				<p class="text-gray-600">
					Follow the steps to create a new survey with enumeration areas and
					enumerators
				</p>
			</div>
			<p-button
				label="Cancel"
				icon="pi pi-times"
				(onClick)="cancel()"
				styleClass="p-button-text p-button-plain"
			></p-button>
		</div>
	</div>

	<!-- Stepper -->
	<div class="bg-white rounded-lg shadow-sm p-6">
		<p-steps
			[model]="steps"
			[(activeIndex)]="activeStep"
			[readonly]="true"
			styleClass="mb-6"
		></p-steps>

		<!-- Step Content -->
		<div class="mt-6">
			<!-- Step 1: Survey Details -->
			<div *ngIf="activeStep === 0">
				<app-admin-survey-creator-details
					[initialData]="surveyData"
					(completed)="onDetailsCompleted($event)"
					(cancelled)="cancel()"
				></app-admin-survey-creator-details>
			</div>

			<!-- Step 2: Enumeration Areas -->
			<div *ngIf="activeStep === 1">
				<app-admin-survey-creator-enumeration-areas
					[selectedEAIds]="selectedEAIds"
					(completed)="onEnumerationAreasCompleted($event)"
					(back)="previousStep()"
				></app-admin-survey-creator-enumeration-areas>
			</div>

			<!-- Step 3: Enumerators -->
			<div *ngIf="activeStep === 2">
				<app-admin-survey-creator-enumerators
					[submitting]="submitting"
					(completed)="onEnumeratorsCompleted($event)"
					(back)="previousStep()"
				></app-admin-survey-creator-enumerators>
			</div>
		</div>
	</div>

	<!-- Toast Messages -->
	<p-toast position="top-right"></p-toast>
</div>
