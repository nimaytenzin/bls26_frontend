<!-- Toast Messages -->
<p-toast></p-toast>

<!-- Survey Management Dashboard -->
<div class="p-6 bg-gray-50 min-h-screen">
	<!-- Header Section -->
	<div class="mb-6">
		<div class="flex justify-between items-center">
			<div>
				<h1 class="text-2xl font-bold text-gray-900">Survey Management</h1>
				<p class="text-sm text-gray-600 mt-1">
					Manage surveys and enumeration area assignments
				</p>
			</div>

			<!-- Action Controls -->
			<div class="flex items-center gap-2">
				<button
					pButton
					type="button"
					label="Create Survey (Wizard)"
					icon="pi pi-plus-circle"
					class="p-button-primary"
					(click)="navigateToSurveyCreator()"
				></button>
			</div>
		</div>
	</div>

	<!-- Tab View Content -->
	<div class="bg-white rounded-lg shadow-sm border border-gray-200">
		<p-tabView
			[(activeIndex)]="activeTabIndex"
			(onChange)="onTabChange($event)"
		>
			<!-- Active Surveys Tab -->
			<p-tabPanel header="Active Surveys" leftIcon="pi pi-check-circle">
				<app-active-surveys-table
					[surveys]="activeSurveys"
					[loading]="loading"
					[selectedSurvey]="selectedSurvey"
					[globalFilterValue]="globalFilterValue"
					(rowSelect)="onActiveSurveyRowSelect($event)"
					(viewSurvey)="viewSurvey($event)"
					(editSurvey)="editSurvey($event)"
					(deleteSurvey)="confirmDelete($event)"
					(downloadHouseholdCounts)="downloadHouseholdCountCSV($event)"
					(globalFilterChange)="onActiveSurveyFilterChange($event)"
				></app-active-surveys-table>
			</p-tabPanel>

			<!-- All Surveys (Paginated) Tab -->
			<p-tabPanel header="All Surveys" leftIcon="pi pi-list">
				<app-all-surveys-table
					[surveys]="allSurveysPaginated"
					[loading]="loading"
					[totalRecords]="totalRecords"
					[rowsPerPage]="rowsPerPage"
					[selectedSurvey]="selectedSurvey"
					[globalFilterValue]="globalFilterValue"
					(lazyLoad)="onAllSurveyLazyLoad($event)"
					(rowSelect)="onAllSurveyRowSelect($event)"
					(viewSurvey)="viewSurvey($event)"
					(editSurvey)="editSurvey($event)"
					(deleteSurvey)="confirmDelete($event)"
					(downloadHouseholdCounts)="downloadHouseholdCountCSV($event)"
					(globalFilterChange)="onAllSurveyFilterChange($event)"
				></app-all-surveys-table>
			</p-tabPanel>
		</p-tabView>
	</div>
</div>

<!-- Delete Confirmation Dialog -->
<p-dialog
	[(visible)]="deleteDialog"
	[style]="{ width: '450px' }"
	header="Confirm Delete"
	[modal]="true"
>
	<ng-template pTemplate="content">
		<div class="flex items-center mb-4">
			<i class="pi pi-exclamation-triangle text-orange-500 text-2xl mr-3"></i>
			<span
				>Are you sure you want to delete
				<strong>{{ selectedSurvey?.name }}</strong
				>?</span
			>
		</div>
		<p class="text-sm text-gray-600">
			This will also remove all enumeration area associations. This action
			cannot be undone.
		</p>
	</ng-template>

	<ng-template pTemplate="footer">
		<button
			pButton
			type="button"
			label="Cancel"
			icon="pi pi-times"
			class="p-button-text"
			(click)="deleteDialog = false"
		></button>
		<button
			pButton
			type="button"
			label="Delete"
			icon="pi pi-trash"
			class="p-button-danger"
			(click)="deleteSurvey()"
		></button>
	</ng-template>
</p-dialog>
