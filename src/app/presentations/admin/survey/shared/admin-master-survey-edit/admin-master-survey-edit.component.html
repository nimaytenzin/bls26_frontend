<div class="p-6">
	<form [formGroup]="surveyForm" class="space-y-4">
		<!-- Name Field -->
		<div>
			<label for="name" class="block text-sm font-medium text-gray-700 mb-2">
				Survey Name *
			</label>
			<input
				id="name"
				type="text"
				pInputText
				formControlName="name"
				placeholder="Enter survey name"
				[class.ng-invalid]="hasFormError('name')"
				class="w-full"
			/>
			<small *ngIf="hasFormError('name')" class="p-error">
				{{ getFormError("name") }}
			</small>
		</div>

		<!-- Description Field -->
		<div>
			<label
				for="description"
				class="block text-sm font-medium text-gray-700 mb-2"
			>
				Description *
			</label>
			<textarea
				id="description"
				pInputTextarea
				formControlName="description"
				placeholder="Enter survey description"
				[class.ng-invalid]="hasFormError('description')"
				class="w-full"
				rows="4"
			></textarea>
			<small *ngIf="hasFormError('description')" class="p-error">
				{{ getFormError("description") }}
			</small>
		</div>

		<!-- Year Field -->
		<div>
			<label for="year" class="block text-sm font-medium text-gray-700 mb-2">
				Survey Year *
			</label>
			<p-inputNumber
				id="year"
				formControlName="year"
				placeholder="Enter survey year"
				[useGrouping]="false"
				[min]="2000"
				[max]="2100"
				[class.ng-invalid]="hasFormError('year')"
				styleClass="w-full"
			>
			</p-inputNumber>
			<small *ngIf="hasFormError('year')" class="p-error">
				{{ getFormError("year") }}
			</small>
			<small class="text-gray-500 block mt-1">
				The year this survey is conducted (e.g., 2025)
			</small>
		</div>

		<!-- Date Fields -->
		<div class="grid grid-cols-2 gap-4">
			<div>
				<label
					for="startDate"
					class="block text-sm font-medium text-gray-700 mb-2"
				>
					Start Date *
				</label>
				<input
					id="startDate"
					type="date"
					pInputText
					formControlName="startDate"
					[class.ng-invalid]="hasFormError('startDate')"
					class="w-full"
				/>
				<small *ngIf="hasFormError('startDate')" class="p-error">
					{{ getFormError("startDate") }}
				</small>
			</div>

			<div>
				<label
					for="endDate"
					class="block text-sm font-medium text-gray-700 mb-2"
				>
					End Date *
				</label>
				<input
					id="endDate"
					type="date"
					pInputText
					formControlName="endDate"
					[class.ng-invalid]="hasFormError('endDate')"
					class="w-full"
				/>
				<small *ngIf="hasFormError('endDate')" class="p-error">
					{{ getFormError("endDate") }}
				</small>
			</div>
		</div>

		<!-- Date Range Error -->
		<div *ngIf="hasDateRangeError()" class="text-sm">
			<small class="p-error">
				End date must be after or equal to start date
			</small>
		</div>

		<!-- Status Field -->
		<div>
			<label for="status" class="block text-sm font-medium text-gray-700 mb-2">
				Status *
			</label>
			<p-dropdown
				id="status"
				formControlName="status"
				[options]="statusOptions"
				optionLabel="label"
				optionValue="value"
				placeholder="Select status"
				styleClass="w-full"
			></p-dropdown>
		</div>
	</form>

	<!-- Footer Buttons -->
	<div class="flex justify-end gap-2 mt-6 pt-4 border-t">
		<button
			pButton
			type="button"
			label="Cancel"
			icon="pi pi-times"
			class="p-button-text"
			(click)="cancel()"
		></button>
		<button
			pButton
			type="button"
			[label]="saving ? 'Saving...' : 'Save Changes'"
			icon="pi pi-check"
			class="p-button-primary"
			[disabled]="saving"
			[loading]="saving"
			(click)="save()"
		></button>
	</div>
</div>
