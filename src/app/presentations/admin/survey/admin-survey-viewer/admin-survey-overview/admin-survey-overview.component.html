<!-- Survey Details and Sampling Parameters Row -->
<div class="flex flex-col lg:flex-row gap-4  ">
	<!-- Survey Details Section -->
	<div
		class="flex-1 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200"
	>
		<div class="p-6">
			<!-- Back Button -->
			<button 
				(click)="back()" 
				class="flex items-center font-medium mb-4 text-gray-600 hover:text-gray-900 transition-colors"
			>
				<i class="pi pi-arrow-left mr-2"></i>
				<span>Back</span>
			</button>

			<!-- Survey Info -->
			<div class="space-y-4">
				<!-- Survey Name -->
				<div>
					<div class="flex items-center justify-between mb-2">
						<h1 class="font-bold text-xl leading-tight text-gray-900">
							{{ survey.name }}
						</h1>
						<div class="flex items-center gap-2">
							<p-button
								icon="pi pi-pencil"
								size="small"
								rounded="true"
								(click)="editSurvey()"
								pTooltip="Edit Survey"
							></p-button>
							<p-button
								icon="pi pi-download"
								size="small"
								rounded="true"
								(click)="downloadHouseholdCountCSV()"
								pTooltip="Download Household Count CSV"
								[disabled]="downloadingCSV"
								[loading]="downloadingCSV"
							></p-button>
							<p-button
								icon="pi pi-trash"
								size="small"
								rounded="true"
								(click)="deleteSurvey()"
								pTooltip="Delete Survey"
								severity="danger"
							></p-button>
						</div>
					</div>
					<p class="text-sm text-gray-600 mb-4" *ngIf="survey.description">
						{{ survey.description }}
					</p>
				</div>

				<!-- Survey Status and Dates Row -->
				<div class="flex flex-wrap items-center gap-4">
					<!-- Survey Status -->
					<div class="flex items-center gap-2">
						<span class="text-sm font-medium text-gray-700">Status:</span>
						<span
							class="px-2 py-1 text-xs font-semibold rounded-full"
							[class.bg-green-100]="survey.status === 'ACTIVE'"
							[class.text-green-800]="survey.status === 'ACTIVE'"
							[class.bg-gray-100]="survey.status !== 'ACTIVE'"
							[class.text-gray-800]="survey.status !== 'ACTIVE'"
						>
							<i
								[class]="
									survey.status === 'ACTIVE'
										? 'pi pi-check-circle mr-1'
										: 'pi pi-times-circle mr-1'
								"
							></i>
							{{ survey.status }}
						</span>
					</div>

					<!-- Duration -->
					<div class="flex items-center gap-4 text-sm text-gray-700">
						<div class="flex items-center gap-2">
							<i class="pi pi-calendar-plus text-xs"></i>
							<span class="font-medium">Start:</span>
							<span>{{ formatDate(survey.startDate) }}</span>
						</div>
						<div class="flex items-center gap-2">
							<i class="pi pi-calendar-minus text-xs"></i>
							<span class="font-medium">End:</span>
							<span>{{ formatDate(survey.endDate) }}</span>
						</div>
					</div>

					<!-- Days Remaining (if active) -->
					<div *ngIf="isSurveyActive()" class="flex items-center gap-2 text-sm">
						<span class="font-medium" [ngClass]="getStatusColor()">
							<i class="pi pi-clock mr-1"></i>
							{{ getDaysRemaining() }} day{{ getDaysRemaining() !== 1 ? 's' : '' }} remaining
						</span>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Global Sampling Parameters Section -->
	<div
		class="w-full lg:w-80 lg:flex-shrink-0 flex flex-col bg-white rounded-2xl shadow-sm border border-gray-200"
	>
		<div class="p-6">
			<app-survey-sampling-global-parameters
				[surveyId]="survey.id"
			></app-survey-sampling-global-parameters>
		</div>
	</div>
</div>
