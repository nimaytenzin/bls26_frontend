<div class="h-[calc(100vh-5rem)]">
	<!-- Loading State -->
	<section
		*ngIf="loading"
		class="h-[calc(100vh-5rem)] flex items-center justify-center"
	>
		<div class="flex flex-col items-center gap-4 text-slate-600">
			<p-progressSpinner styleClass="w-12 h-12"></p-progressSpinner>
			<div class="text-center">
				<p class="text-lg font-semibold text-slate-900">
					Loading survey details
				</p>
				<p class="text-sm text-slate-500">Please wait...</p>
			</div>
		</div>
	</section>

	<!-- Not Found State -->
	<section
		*ngIf="notFound && !loading"
		class="h-[calc(100vh-5rem)] flex items-center justify-center"
	>
		<div
			class="rounded-lg border border-red-200 bg-red-50 p-8 text-center text-red-700 shadow-sm max-w-md"
		>
			<i class="pi pi-exclamation-triangle text-4xl mb-3 block"></i>
			<h2 class="text-lg font-semibold mb-2">Survey Not Found</h2>
			<p class="text-sm mb-6">
				The survey you're looking for doesn't exist or has been removed.
			</p>
			<div class="flex flex-wrap justify-center gap-3">
				<button
					type="button"
					(click)="navigateToMasterSurvey()"
					class="inline-flex items-center justify-center rounded-md border border-red-200 bg-white px-4 py-2 text-sm font-semibold text-red-600 transition hover:border-red-300"
				>
					<i class="pi pi-arrow-left mr-2"></i>
					Back to Survey List
				</button>
			</div>
		</div>
	</section>

	<!-- Main Content: Split Layout -->
	<ng-container *ngIf="survey && !loading && !notFound">
		<section class="flex flex-col gap-4 h-[calc(100vh-5rem)] bg-white ">
			<app-survey-overview
						[surveyId]="surveyId"
						[survey]="survey"
					></app-survey-overview>
			<!-- Right Pane: Tabs Content -->
			<div class="flex-1 relative bg-white h-full ">
				<p-tabView class="h-full">
					<!-- PRIMARY: Enumeration Areas Tab (Default) -->
					<p-tabPanel header="Enumeration Areas">
						<app-admin-survey-ea-management
							[surveyId]="survey.id"
						></app-admin-survey-ea-management>
					</p-tabPanel>

					<!-- Secondary: Household Listings (All EAs view) -->
					<p-tabPanel header="Household Listings">
						<app-admin-survey-household-listings
							[surveyId]="survey.id"
							[surveyName]="survey.name"
						></app-admin-survey-household-listings>
					</p-tabPanel>

					<!-- Keep: Enumerators -->
					<p-tabPanel header="Enumerators">
						<app-admin-survey-users [surveyId]="survey.id"></app-admin-survey-users>
					</p-tabPanel>

					<!-- <p-tabPanel header="Sampling">
						<app-admin-survey-sampling
							[surveyId]="survey.id"
							[surveyName]="survey.name"
						></app-admin-survey-sampling>
					</p-tabPanel> -->
				</p-tabView>
			</div>
		</section>
	</ng-container>

	<!-- Toast Messages -->
	<p-toast position="top-right"></p-toast>

	<!-- Confirmation Dialog -->
	<p-confirmDialog></p-confirmDialog>
</div>
