<div class="h-[calc(100vh-5rem)]">
	<!-- Loading State -->
	<div *ngIf="loading" class="flex justify-center items-center h-full">
		<p-progressSpinner></p-progressSpinner>
	</div>

	<!-- Not Found State -->
	<div
		*ngIf="notFound && !loading"
		class="flex justify-center items-center h-full"
	>
		<div class="text-center py-16">
			<i class="pi pi-exclamation-triangle text-6xl text-gray-400 mb-4"></i>
			<h2 class="text-2xl font-bold text-gray-700 mb-2">Survey Not Found</h2>
			<p class="text-gray-500 mb-6">
				The survey you're looking for doesn't exist or has been removed.
			</p>
			<p-button
				label="Back to Survey List"
				icon="pi pi-arrow-left"
				(onClick)="navigateToMasterSurvey()"
				styleClass="p-button-outlined"
			>
			</p-button>
		</div>
	</div>

	<!-- Main Content: Split Layout -->
	<ng-container *ngIf="survey && !loading && !notFound">
		<section class="flex gap-4 h-[calc(100vh-5rem)] bg-white">
			<!-- Left Pane: Survey Details & Metadata -->
			<div class="w-[25vw] flex flex-col gap-4 overflow-y-auto p-6">
				<!-- Back Button -->
				<div class="mb-2">
					<button
						type="button"
						(click)="navigateToMasterSurvey()"
						class="flex items-center gap-2 text-primary-600 hover:text-primary-700 font-semibold transition"
					>
						<i class="pi pi-arrow-left"></i>
						<span>Back to Surveys</span>
					</button>
				</div>

				<!-- Survey Header -->
				<div>
					<h1 class="text-3xl font-semibold text-slate-900">
						{{ survey.name }}
					</h1>
					<p class="mt-2 text-sm text-slate-600" *ngIf="survey.description">
						{{ survey.description }}
					</p>
				</div>

				<!-- Action Buttons -->
				<div class="flex items-center justify-end gap-2">
					<p-button
						label="Edit"
						icon="pi pi-pencil"
						(onClick)="editSurvey()"
						styleClass="p-button-sm flex-1"
						severity="secondary"
					></p-button>

					<p-button
						label="Delete"
						icon="pi pi-trash"
						(onClick)="deleteSurvey()"
						styleClass="p-button-sm flex-1"
						severity="danger"
					></p-button>
				</div>

				<!-- Survey Metadata Card -->
				<div class="space-y-4">
					<!-- Overview -->
					<app-admin-survey-overview
						[surveyId]="surveyId"
						[survey]="survey"
					></app-admin-survey-overview>
				</div>
			</div>

			<!-- Right Pane: Tabs Content -->
			<div
				class="flex-1 relative rounded-lg overflow-hidden shadow-sm bg-white"
			>
				<div class="h-full overflow-auto">
					<p-tabView
						[(activeIndex)]="activeTabIndex"
						styleClass="custom-tabview h-full"
					>
						<!-- Supervisors & Enumerators Tab -->
						<p-tabPanel header="Supervisors & Enumerators">
							<app-admin-survey-supervisors-enumerators
								[surveyId]="survey.id"
							></app-admin-survey-supervisors-enumerators>
						</p-tabPanel>

						<!-- Manage Survey Enumeration Areas -->
						<p-tabPanel header="Enumeration Areas">
							<app-admin-survey-ea-management
								[surveyId]="survey.id"
							></app-admin-survey-ea-management>
						</p-tabPanel>

						<!-- Household Listings Tab -->
						<p-tabPanel header="Household Listings">
							<app-admin-survey-enumeration-area-household-listings
								[surveyId]="survey.id"
								[surveyName]="survey.name"
							></app-admin-survey-enumeration-area-household-listings>
						</p-tabPanel>

						<!-- Sampling Tab -->
						<p-tabPanel header="Sampling">
							<app-admin-survey-sampling></app-admin-survey-sampling>
						</p-tabPanel>
					</p-tabView>
				</div>
			</div>
		</section>
	</ng-container>

	<!-- Toast Messages -->
	<p-toast position="top-right"></p-toast>

	<!-- Confirmation Dialog -->
	<p-confirmDialog></p-confirmDialog>
</div>
