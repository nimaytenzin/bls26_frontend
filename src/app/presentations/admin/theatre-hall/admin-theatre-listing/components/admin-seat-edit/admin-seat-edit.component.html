<!-- Seat Edit Modal -->
<p-toast position="top-right"></p-toast>

<div class="max-w-2xl mx-auto p-6">
	<!-- Header Card -->

	<!-- Current Seat Info -->
	<div class="mb-6 p-4 bg-gray-50 dark:bg-gray-800 rounded-lg">
		<h3 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-3">
			Current Seat Information
		</h3>
		<div class="grid grid-cols-2 gap-4 text-sm">
			<div>
				<span class="text-gray-500 dark:text-gray-400">Position:</span>
				<span class="ml-2 font-medium text-gray-900 dark:text-white">
					Row {{ String.fromCharCode(64 + seat.rowId) }}, Column
					{{ seat.colId }}
				</span>
			</div>
			<div>
				<span class="text-gray-500 dark:text-gray-400">Category:</span>
				<span class="ml-2 font-medium text-gray-900 dark:text-white">
					{{ seat.category?.name || "Unknown" }}
				</span>
			</div>
		</div>
	</div>

	<!-- Edit Form -->
	<form (ngSubmit)="onSubmit()" #editForm="ngForm">
		<div class="space-y-6">
			<!-- Seat Number -->
			<div class="space-y-2">
				<label
					for="seatNumber"
					class="block text-sm font-medium text-gray-700 dark:text-gray-300"
				>
					Seat Number <span class="text-red-500">*</span>
				</label>
				<p-inputText
					id="seatNumber"
					[(ngModel)]="seatNumber"
					name="seatNumber"
					placeholder="Enter seat number (e.g., A1, B12)"
					styleClass="w-full"
					required
					#seatNumberInput="ngModel"
					[class.p-invalid]="seatNumberInput.invalid && seatNumberInput.touched"
				></p-inputText>
				<small
					*ngIf="seatNumberInput.invalid && seatNumberInput.touched"
					class="p-error block"
					id="seatNumber-help"
				>
					Seat Number is required.
				</small>
			</div>

			<!-- Seat Category -->
			<div class="space-y-2">
				<label
					for="categoryId"
					class="block text-sm font-medium text-gray-700 dark:text-gray-300"
				>
					Seat Category <span class="text-red-500">*</span>
				</label>
				<p-dropdown
					id="categoryId"
					[(ngModel)]="categoryId"
					name="categoryId"
					[options]="seatCategories"
					optionLabel="name"
					optionValue="id"
					placeholder="Select seat category"
					styleClass="w-full"
					required
					#categoryInput="ngModel"
					[class.p-invalid]="categoryInput.invalid && categoryInput.touched"
				>
					<ng-template pTemplate="selectedItem" let-category>
						<div class="flex items-center gap-2" *ngIf="category">
							<div
								class="w-4 h-4 rounded border border-white shadow-sm"
								[class]="getSeatCategoryColor(category.id)"
							></div>
							<span>{{ getSeatCategoryName(category.id) }}</span>
						</div>
					</ng-template>
					<ng-template pTemplate="item" let-category>
						<div class="flex items-center gap-2">
							<div
								class="w-4 h-4 rounded border border-white shadow-sm"
								[class]="category.baseColorHexCode"
							></div>
							<div>
								<div class="font-medium">{{ category.name }}</div>
								<div class="text-sm text-gray-500" *ngIf="category.description">
									{{ category.description }}
								</div>
							</div>
						</div>
					</ng-template>
				</p-dropdown>
				<small
					*ngIf="categoryInput.invalid && categoryInput.touched"
					class="p-error block"
					id="categoryId-help"
				>
					Seat Category is required.
				</small>
			</div>

			<!-- Annotation -->
			<div class="space-y-2">
				<label
					for="annotation"
					class="block text-sm font-medium text-gray-700 dark:text-gray-300"
				>
					Annotation (Optional)
				</label>
				<p-textarea
					id="annotation"
					[(ngModel)]="annotation"
					name="annotation"
					placeholder="Enter any additional notes or remarks"
					styleClass="w-full"
					rows="3"
					#annotationInput="ngModel"
				></p-textarea>
			</div>
		</div>

		<!-- Action Buttons -->
		<div class="flex justify-end gap-3 mt-8">
			<p-button
				label="Cancel"
				icon="pi pi-times"
				severity="secondary"
				[outlined]="true"
				(onClick)="onClose()"
				[disabled]="isSubmitting"
			></p-button>
			<p-button
				label="Update Seat"
				icon="pi pi-check"
				type="submit"
				[disabled]="!isFormValid() || isSubmitting"
				[loading]="isSubmitting"
			></p-button>
		</div>
	</form>
</div>
