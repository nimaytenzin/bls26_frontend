<div class="add-child-wrapper">
  <div class="add-child-card">
    <h2>Add Your Child</h2>

    <form [formGroup]="childForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label>Child's Full Name</label>
        <input type="text" formControlName="name" placeholder="e.g. Deki Wangmo" />
      </div>

      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" formControlName="dob" />
      </div>

      <div class="form-group">
        <label>ECCD Center Code</label>
        <div class="input-row">
          <input type="text" formControlName="eccdCode" placeholder="e.g. LITTLESTEPS123" />
          <button type="button" class="btn outline" (click)="validateCode()">Check</button>
        </div>
        <div *ngIf="isChecking" class="check-status">🔄 Validating...</div>
        <div *ngIf="eccdValid" class="success">✅ Linked to: <strong>{{ eccdName }}</strong></div>
        <div *ngIf="!eccdValid && !isChecking && childForm.get('eccdCode')?.touched" class="error">❌ Invalid ECCD code</div>
      </div>

      <button class="btn primary" type="submit" [disabled]="childForm.invalid || !eccdValid">Add Child</button>
    </form>
  </div>
</div>
