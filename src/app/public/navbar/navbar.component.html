<div
	class="fixed w-full z-50 top-0 left-0 py-4 bg-black bg-opacity-95 border-b border-gray-800"
>
	<div class="max-w-screen-xl mx-auto">
		<p-menubar styleClass="bg-transparent border-none" [model]="items">
			<ng-template pTemplate="start">
				<div class="flex items-center justify-center gap-3">
					<img src="logo.png" height="40" alt="Druk Cinema Logo" class="h-10" />
					<p class="text-xl font-semibold text-white hidden sm:inline">
						Druk Cinema
					</p>
				</div>
			</ng-template>

			<ng-template pTemplate="end">
				<p-button
					label="Login"
					(click)="goToLoginPage()"
					styleClass=" p-button-sm bg-blue-600 hover:bg-blue-700 border-none"
				></p-button>
			</ng-template>
		</p-menubar>
	</div>
</div>

<div class="h-16"></div>
