<public-navbar></public-navbar>

<div class="reset-wrapper">
  <div class="reset-card">
    <h2>Reset Password</h2>
    <p>Enter your registered email and we'll send you a link to reset your password.</p>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="e.g. sonam@email.com" />
        <div class="error" *ngIf="submitted && resetForm.get('email')?.invalid">
          Please enter a valid email.
        </div>
      </div>

      <button type="submit" class="btn primary" [disabled]="resetForm.invalid">Send Reset Link</button>
    </form>

    <div class="reset-footer">
      Remembered your password? <a routerLink="/auth/login">Back to Login</a>
    </div>
  </div>
</div>
