<public-navbar></public-navbar>

<div class="register-wrapper">
  <div class="register-card">
    <h2>Create Your Account</h2>

    <div class="role-toggle">
      <button 
        [class.active]="selectedRole === 'parent'" 
        (click)="selectRole('parent')">I'm a Parent</button>
      <button 
        [class.active]="selectedRole === 'provider'" 
        (click)="selectRole('provider')">I'm a Provider</button>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <!-- Shared Fields -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Your full name" />
      </div>

      <div class="form-group" *ngIf="selectedRole === 'provider'">
        <label>Organization Name</label>
        <input type="text" formControlName="organization" placeholder="ECCD Center Name" />
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Email address" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Password" />
      </div>

      <button type="submit" [disabled]="registerForm.invalid" class="btn primary">Register</button>
    </form>

    <div class="register-footer">
      Already have an account? <a routerLink="/auth/login">Login</a>
    </div>
  </div>
</div>
