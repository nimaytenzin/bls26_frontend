<div class="dashboard-wrapper">
    <h2>Welcome to Your ECCD Dashboard</h2>
  
    <div class="stat-grid">
      <div class="stat-card">
        <h3>{{ stats.children }}</h3>
        <p>Total Children Enrolled</p>
      </div>
  
      <div class="stat-card">
        <h3>{{ stats.staff }}</h3>
        <p>Active Staff Members</p>
      </div>
  
      <div class="stat-card">
        <h3>{{ stats.pendingApprovals }}</h3>
        <p>Pending Child Approvals</p>
      </div>
  
      <div class="stat-card">
        <h3>{{ stats.activities }}</h3>
        <p>Activities Logged</p>
      </div>
    </div>
  </div>
